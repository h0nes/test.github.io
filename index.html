<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XIAO BLE Macro Pad</title>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#1a1f29;
      --panel2:#232a36;
      --text:#ffffff;
      --sub:#b7c0cc;
      --accent:#4da3ff;
      --danger:#ff5f6d;
      --ok:#3ddc97;
      --btn:#2b3442;
      --btn2:#374355;
      --shadow:0 8px 24px rgba(0,0,0,0.35);
      --radius:16px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:sans-serif;
      padding:16px;
    }

    .app{
      max-width:900px;
      margin:0 auto;
    }

    .header{
      background:var(--panel);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    .title{
      font-size:28px;
      font-weight:700;
      margin-bottom:10px;
    }

    .status{
      background:var(--panel2);
      border-radius:12px;
      padding:12px;
      font-size:16px;
      color:var(--sub);
      min-height:48px;
      margin-bottom:12px;
      word-break:break-word;
    }

    .top-buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .top-buttons button{
      flex:1;
      min-width:140px;
      height:52px;
      border:none;
      border-radius:12px;
      color:white;
      font-size:18px;
      font-weight:700;
      background:var(--btn2);
    }

    .top-buttons button.connect{
      background:var(--accent);
    }

    .top-buttons button.disconnect{
      background:var(--danger);
    }

    .display-panel{
      background:var(--panel);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    .display-label{
      color:var(--sub);
      font-size:14px;
      margin-bottom:8px;
    }

    .display{
      width:100%;
      min-height:72px;
      background:#0b0e13;
      border:2px solid #313a48;
      border-radius:12px;
      padding:14px;
      font-size:36px;
      font-weight:700;
      letter-spacing:1px;
      overflow-wrap:anywhere;
    }

    .main{
      display:grid;
      grid-template-columns: 2fr 1fr;
      gap:16px;
    }

    .panel{
      background:var(--panel);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
    }

    .panel-title{
      font-size:20px;
      font-weight:700;
      margin-bottom:14px;
    }

    .keypad{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:12px;
    }

    .macros{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    button.key,
    button.macro{
      border:none;
      border-radius:14px;
      min-height:72px;
      font-size:28px;
      font-weight:700;
      color:white;
      background:var(--btn);
      box-shadow:var(--shadow);
    }

    button.key:active,
    button.macro:active,
    .top-buttons button:active{
      transform:scale(0.98);
    }

    .fn{
      background:#4c5a70 !important;
      font-size:22px !important;
    }

    .send{
      background:var(--ok) !important;
      color:#062414 !important;
      font-size:24px !important;
    }

    .danger{
      background:var(--danger) !important;
    }

    .macro{
      min-height:84px;
      font-size:20px !important;
      padding:10px;
      line-height:1.2;
    }

    .macro small{
      display:block;
      font-size:13px;
      opacity:0.8;
      margin-top:4px;
      font-weight:400;
    }

    @media (max-width: 720px){
      .main{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title">XIAO BLE テンキー + マクロパッド</div>
      <div id="status" class="status">未接続</div>
      <div class="top-buttons">
        <button class="connect" onclick="connectBLE()">接続</button>
        <button class="disconnect" onclick="disconnectBLE()">切断</button>
      </div>
    </div>

    <div class="display-panel">
      <div class="display-label">入力中</div>
      <div id="display" class="display"></div>
    </div>

    <div class="main">
      <div class="panel">
        <div class="panel-title">テンキー</div>
        <div class="keypad">
          <button class="key" onclick="appendInput('7')">7</button>
          <button class="key" onclick="appendInput('8')">8</button>
          <button class="key" onclick="appendInput('9')">9</button>

          <button class="key" onclick="appendInput('4')">4</button>
          <button class="key" onclick="appendInput('5')">5</button>
          <button class="key" onclick="appendInput('6')">6</button>

          <button class="key" onclick="appendInput('1')">1</button>
          <button class="key" onclick="appendInput('2')">2</button>
          <button class="key" onclick="appendInput('3')">3</button>

          <button class="key fn" onclick="backspaceInput()">BS</button>
          <button class="key" onclick="appendInput('0')">0</button>
          <button class="key fn" onclick="clearInput()">C</button>

          <button class="key fn" onclick="appendInput('.')">.</button>
          <button class="key fn" onclick="appendInput(',')">,</button>
          <button class="key send" onclick="sendCurrentInput()">Enter</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">マクロ</div>
        <div class="macros">
          <button class="macro" onclick="sendMacro('MACRO_COPY')">
            Copy
            <small>MACRO_COPY</small>
          </button>

          <button class="macro" onclick="sendMacro('MACRO_PASTE')">
            Paste
            <small>MACRO_PASTE</small>
          </button>

          <button class="macro" onclick="sendMacro('MACRO_UNDO')">
            Undo
            <small>MACRO_UNDO</small>
          </button>

          <button class="macro" onclick="sendMacro('MACRO_SAVE')">
            Save
            <small>MACRO_SAVE</small>
          </button>

          <button class="macro" onclick="sendMacro('MACRO_ENTER')">
            Macro Enter
            <small>MACRO_ENTER</small>
          </button>

          <button class="macro danger" onclick="sendMacro('MACRO_ESC')">
            Esc
            <small>MACRO_ESC</small>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const RX_UUID      = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

    let device = null;
    let server = null;
    let service = null;
    let rxChar = null;
    let inputBuffer = "";

    const statusEl = document.getElementById("status");
    const displayEl = document.getElementById("display");

    function setStatus(text){
      statusEl.textContent = text;
      console.log(text);
    }

    function updateDisplay(){
      displayEl.textContent = inputBuffer;
    }

    function appendInput(char){
      inputBuffer += char;
      updateDisplay();
    }

    function backspaceInput(){
      inputBuffer = inputBuffer.slice(0, -1);
      updateDisplay();
    }

    function clearInput(){
      inputBuffer = "";
      updateDisplay();
    }

    async function connectBLE(){
      try{
        setStatus("BLEデバイスを検索中...");

        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }]
        });

        setStatus("接続中: " + (device.name || "名称不明"));

        device.addEventListener("gattserverdisconnected", onDisconnected);

        server = await device.gatt.connect();
        service = await server.getPrimaryService(SERVICE_UUID);
        rxChar = await service.getCharacteristic(RX_UUID);

        setStatus("接続完了: " + (device.name || "名称不明"));
      }catch(e){
        setStatus("接続失敗: " + (e.message || e.name || String(e)));
      }
    }

    function onDisconnected(){
      setStatus("切断されました");
      server = null;
      service = null;
      rxChar = null;
    }

    async function disconnectBLE(){
      try{
        if(device && device.gatt && device.gatt.connected){
          device.gatt.disconnect();
        }
        device = null;
        server = null;
        service = null;
        rxChar = null;
        setStatus("手動で切断しました");
      }catch(e){
        setStatus("切断失敗: " + (e.message || e.name || String(e)));
      }
    }

    async function sendText(text){
      if(!rxChar){
        setStatus("未接続のため送信できません");
        return false;
      }

      try{
        const data = new TextEncoder().encode(text);
        await rxChar.writeValue(data);
        setStatus("送信: " + text.replace(/\n/g, "\\n"));
        return true;
      }catch(e){
        setStatus("送信失敗: " + (e.message || e.name || String(e)));
        return false;
      }
    }

    async function sendCurrentInput(){
      if(inputBuffer.length === 0){
        setStatus("入力が空です");
        return;
      }

      const ok = await sendText("NUM:" + inputBuffer + "\n");
      if(ok){
        inputBuffer = "";
        updateDisplay();
      }
    }

    async function sendMacro(name){
      await sendText(name + "\n");
    }

    updateDisplay();
  </script>
</body>
</html>
