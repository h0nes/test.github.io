<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Bluefy テプラ3桁読取</title>
<style>
  :root{
    --bg:#0b0d10;
    --card:#151922;
    --text:#f4f7fb;
    --muted:#9ea7b3;
    --accent:#0aa7bf;
    --ok:#42d392;
    --warn:#f3c969;
    --danger:#ff6b6b;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    -webkit-user-select:none;
    user-select:none;
    touch-action:manipulation;
  }
  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:12px 12px 32px;
  }
  .card{
    background:var(--card);
    border-radius:18px;
    padding:12px;
    margin-bottom:12px;
    box-shadow:0 6px 20px rgba(0,0,0,.28);
  }
  .title{
    font-size:18px;
    font-weight:700;
    margin:0 0 10px;
  }
  .resultBox{
    text-align:center;
    padding:18px 10px;
    border-radius:14px;
    background:#0f1217;
  }
  .big{
    font-size:72px;
    font-weight:800;
    line-height:1;
    letter-spacing:.08em;
  }
  .sub{
    margin-top:8px;
    font-size:15px;
    color:var(--warn);
  }
  .controls{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:12px;
  }
  button{
    appearance:none;
    border:none;
    border-radius:14px;
    padding:16px 14px;
    font-size:20px;
    font-weight:800;
    color:#fff;
    background:var(--accent);
    touch-action:manipulation;
  }
  button:active{transform:scale(.99)}
  .secondary{background:#394150}
  .danger{background:#b43f4a}
  .videoWrap{
    position:relative;
    overflow:hidden;
    border-radius:18px;
    background:#000;
    aspect-ratio:3/4;
  }
  video, canvas.preview{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .overlay{
    position:absolute;
    inset:0;
    pointer-events:none;
  }
  .guide{
    position:absolute;
    left:12%;
    top:38%;
    width:76%;
    height:16%;
    border:3px solid rgba(255,220,120,.95);
    border-radius:12px;
    box-shadow:0 0 0 9999px rgba(0,0,0,.30);
  }
  .guideText{
    position:absolute;
    left:0;
    right:0;
    top:calc(38% - 28px);
    text-align:center;
    font-size:14px;
    color:#ffe08a;
    font-weight:700;
    text-shadow:0 1px 3px rgba(0,0,0,.8);
  }
  .row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .mini{
    width:100%;
    border-radius:12px;
    background:#000;
    display:block;
  }
  .log{
    background:#0b0e13;
    border-radius:14px;
    padding:10px;
    height:220px;
    overflow:auto;
    white-space:pre-wrap;
    font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size:14px;
    line-height:1.45;
  }
  .hint{
    color:var(--muted);
    font-size:14px;
    line-height:1.6;
  }
  .badge{
    display:inline-block;
    padding:4px 8px;
    border-radius:999px;
    background:#222934;
    color:#cbd5e1;
    font-size:12px;
    font-weight:700;
    margin-right:6px;
  }
  .statusOK{color:var(--ok)}
  .statusNG{color:var(--danger)}
</style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <div class="title">認識結果</div>
    <div class="resultBox">
      <div id="result" class="big">---</div>
      <div id="sub" class="sub">候補: --- / 信頼度 ---</div>
    </div>
    <div class="controls">
      <button id="startBtn">カメラ開始</button>
      <button id="clearBtn" class="secondary">ログ消去</button>
    </div>
  </div>

  <div class="card">
    <div class="title">カメラ</div>
    <div class="videoWrap">
      <video id="video" playsinline muted autoplay></video>
      <div class="overlay">
        <div class="guideText">3桁数字を枠内に合わせてください</div>
        <div class="guide"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="title">前処理プレビュー</div>
    <div class="row">
      <div>
        <div class="badge">切り出し</div>
        <canvas id="roiCanvas" class="mini" width="360" height="120"></canvas>
      </div>
      <div>
        <div class="badge">二値化</div>
        <canvas id="binCanvas" class="mini" width="360" height="120"></canvas>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="title">ログ</div>
    <div id="log" class="log"></div>
  </div>

  <div class="card">
    <div class="title">使い方</div>
    <div class="hint">
      中央の枠にテプラの3桁数字を合わせてください。<br>
      精度向上のため、ラベル部分だけがなるべく大きく写るようにしてください。<br>
      背景が派手でも、<b>白いラベル部分を多めに枠へ入れる</b>と認識が安定しやすいです。<br>
      Safari/BluefyではHTTPS配信が必要です。<br>
      文字が細い場合は、少し離してからズーム気味にすると改善することがあります。
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
(() => {
  const video = document.getElementById('video');
  const startBtn = document.getElementById('startBtn');
  const clearBtn = document.getElementById('clearBtn');
  const resultEl = document.getElementById('result');
  const subEl = document.getElementById('sub');
  const logEl = document.getElementById('log');

  const roiCanvas = document.getElementById('roiCanvas');
  const roiCtx = roiCanvas.getContext('2d', { willReadFrequently: true });
  const binCanvas = document.getElementById('binCanvas');
  const binCtx = binCanvas.getContext('2d', { willReadFrequently: true });

  let stream = null;
  let worker = null;
  let running = false;
  let ocrBusy = false;
  let lastAccepted = '';
  let lastAcceptedTime = 0;

  const recent = [];
  const MAX_RECENT = 10;

  function addLog(text){
    const t = new Date();
    const hh = String(t.getHours()).padStart(2,'0');
    const mm = String(t.getMinutes()).padStart(2,'0');
    const ss = String(t.getSeconds()).padStart(2,'0');
    const ms = String(t.getMilliseconds()).padStart(3,'0');
    logEl.textContent += `[${hh}:${mm}:${ss}.${ms}] ${text}\n`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setResult(main, sub){
    resultEl.textContent = main;
    subEl.textContent = sub;
  }

  async function initTesseract(){
    if (worker) return;
    addLog('OCR初期化中...');
    worker = await Tesseract.createWorker('eng', 1, {
      logger: () => {}
    });
    await worker.setParameters({
      tessedit_char_whitelist: '0123456789',
      preserve_interword_spaces: '0',
      user_defined_dpi: '300'
    });
    addLog('OCR初期化完了');
  }

  async function startCamera(){
    if (running) return;
    try{
      await initTesseract();

      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      running = true;
      startBtn.textContent = 'カメラ停止';
      addLog('カメラ開始');
      loop();
    }catch(err){
      console.error(err);
      addLog('カメラ開始失敗: ' + err.message);
      alert('カメラを開始できませんでした。HTTPSで開いているか、カメラ権限が許可されているか確認してください。');
    }
  }

  function stopCamera(){
    running = false;
    if (stream){
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    video.srcObject = null;
    startBtn.textContent = 'カメラ開始';
    addLog('カメラ停止');
  }

  function clamp(v,min,max){ return Math.max(min, Math.min(max,v)); }

  function cropROIToCanvas(){
    if (!video.videoWidth || !video.videoHeight) return null;

    const vw = video.videoWidth;
    const vh = video.videoHeight;

    // オーバーレイのガイドに近い比率
    const rx = 0.12;
    const ry = 0.38;
    const rw = 0.76;
    const rh = 0.16;

    const sx = Math.floor(vw * rx);
    const sy = Math.floor(vh * ry);
    const sw = Math.floor(vw * rw);
    const sh = Math.floor(vh * rh);

    // 少し高解像度で切り出し
    roiCanvas.width = 720;
    roiCanvas.height = 220;
    roiCtx.drawImage(video, sx, sy, sw, sh, 0, 0, roiCanvas.width, roiCanvas.height);

    return { sx, sy, sw, sh };
  }

  function enhanceGrayAndThreshold(srcCtx, dstCtx, w, h, opt = {}){
    const {
      contrast = 1.9,
      brightness = 0,
      blur = false,
      thresholdBias = 0
    } = opt;

    const img = srcCtx.getImageData(0,0,w,h);
    const data = img.data;

    // グレースケール + コントラスト調整
    const gray = new Uint8ClampedArray(w*h);
    for(let i=0, p=0; i<data.length; i+=4, p++){
      let g = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
      g = (g - 128) * contrast + 128 + brightness;
      gray[p] = clamp(g, 0, 255);
    }

    // 軽い3x3ブラー
    let work = gray;
    if (blur){
      const out = new Uint8ClampedArray(w*h);
      for(let y=1; y<h-1; y++){
        for(let x=1; x<w-1; x++){
          let sum = 0;
          for(let dy=-1; dy<=1; dy++){
            for(let dx=-1; dx<=1; dx++){
              sum += gray[(y+dy)*w + (x+dx)];
            }
          }
          out[y*w+x] = sum / 9;
        }
      }
      work = out;
    }

    // Otsu
    const hist = new Uint32Array(256);
    for(let i=0; i<work.length; i++) hist[work[i]]++;
    const total = work.length;
    let sum = 0;
    for(let i=0; i<256; i++) sum += i * hist[i];

    let sumB = 0, wB = 0, varMax = 0, th = 127;
    for(let t=0; t<256; t++){
      wB += hist[t];
      if (!wB) continue;
      const wF = total - wB;
      if (!wF) break;
      sumB += t * hist[t];
      const mB = sumB / wB;
      const mF = (sum - sumB) / wF;
      const v = wB * wF * (mB - mF) * (mB - mF);
      if (v > varMax){
        varMax = v;
        th = t;
      }
    }
    th = clamp(th + thresholdBias, 0, 255);

    // 二値化: 黒文字前提
    const out = dstCtx.createImageData(w, h);
    for(let i=0, p=0; p<work.length; i+=4, p++){
      const v = work[p] < th ? 0 : 255;
      out.data[i] = v;
      out.data[i+1] = v;
      out.data[i+2] = v;
      out.data[i+3] = 255;
    }
    dstCtx.putImageData(out, 0, 0);
  }

  function trimToContent(srcCanvas){
    const ctx = srcCanvas.getContext('2d', { willReadFrequently: true });
    const { width:w, height:h } = srcCanvas;
    const img = ctx.getImageData(0,0,w,h);
    const d = img.data;

    let minX=w, minY=h, maxX=0, maxY=0;
    let found = false;

    for(let y=0; y<h; y++){
      for(let x=0; x<w; x++){
        const i = (y*w + x) * 4;
        const v = d[i]; // binary
        if(v < 128){
          found = true;
          if(x < minX) minX = x;
          if(y < minY) minY = y;
          if(x > maxX) maxX = x;
          if(y > maxY) maxY = y;
        }
      }
    }

    if(!found){
      return srcCanvas;
    }

    // 余白
    const padX = Math.floor((maxX - minX + 1) * 0.10) + 8;
    const padY = Math.floor((maxY - minY + 1) * 0.18) + 8;
    minX = clamp(minX - padX, 0, w-1);
    minY = clamp(minY - padY, 0, h-1);
    maxX = clamp(maxX + padX, 0, w-1);
    maxY = clamp(maxY + padY, 0, h-1);

    const tw = maxX - minX + 1;
    const th = maxY - minY + 1;

    const out = document.createElement('canvas');
    out.width = Math.max(1, tw * 2);
    out.height = Math.max(1, th * 2);
    out.getContext('2d').drawImage(srcCanvas, minX, minY, tw, th, 0, 0, out.width, out.height);
    return out;
  }

  async function recognizeCanvas(canvas, psm = 7){
    if (!worker) return null;
    try{
      await worker.setParameters({
        tessedit_pageseg_mode: String(psm),
        tessedit_char_whitelist: '0123456789'
      });
      const { data } = await worker.recognize(canvas);
      const raw = (data.text || '').replace(/\s/g, '');
      const digits = (raw.match(/\d/g) || []).join('');
      const conf = typeof data.confidence === 'number' ? data.confidence / 100 : 0;
      return { raw, digits, confidence: conf };
    }catch(err){
      return null;
    }
  }

  function scoreCandidate(s){
    if (!s) return -999;
    let score = 0;
    if (/^\d{3}$/.test(s)) score += 100;
    if (s.length === 3) score += 15;
    if (/^\d+$/.test(s)) score += 10;
    return score;
  }

  function pushRecent(value, conf){
    recent.push({ value, conf, time: Date.now() });
    while(recent.length > MAX_RECENT) recent.shift();
  }

  function decideStable(){
    const recent2 = recent.filter(r => /^\d{3}$/.test(r.value));
    if (recent2.length < 3) return null;

    const map = new Map();
    for (const r of recent2){
      if (!map.has(r.value)) map.set(r.value, { count:0, confSum:0 });
      const m = map.get(r.value);
      m.count++;
      m.confSum += r.conf;
    }

    let best = null;
    for (const [value, info] of map.entries()){
      if (!best || info.count > best.count || (info.count === best.count && info.confSum > best.confSum)){
        best = { value, count:info.count, confAvg: info.confSum / info.count };
      }
    }

    if (best && (best.count >= 3 || best.confAvg >= 0.80)){
      return best;
    }
    return null;
  }

  async function processFrame(){
    cropROIToCanvas();

    const w = roiCanvas.width;
    const h = roiCanvas.height;
    binCanvas.width = w;
    binCanvas.height = h;

    // 前処理パターン1
    enhanceGrayAndThreshold(roiCtx, binCtx, w, h, {
      contrast: 2.2,
      brightness: 0,
      blur: true,
      thresholdBias: -8
    });

    const c1 = trimToContent(binCanvas);

    // 前処理パターン2
    const tmp2 = document.createElement('canvas');
    tmp2.width = w;
    tmp2.height = h;
    const tmp2ctx = tmp2.getContext('2d', { willReadFrequently: true });
    enhanceGrayAndThreshold(roiCtx, tmp2ctx, w, h, {
      contrast: 1.7,
      brightness: 4,
      blur: false,
      thresholdBias: 10
    });
    const c2 = trimToContent(tmp2);

    // 前処理パターン3: 元画像をそのまま少し拡大
    const c3 = document.createElement('canvas');
    c3.width = w * 2;
    c3.height = h * 2;
    c3.getContext('2d').drawImage(roiCanvas, 0, 0, c3.width, c3.height);

    const tries = [
      await recognizeCanvas(c1, 7),
      await recognizeCanvas(c1, 8),
      await recognizeCanvas(c2, 7),
      await recognizeCanvas(c2, 8),
      await recognizeCanvas(c3, 7)
    ].filter(Boolean);

    if (!tries.length) return;

    let best = null;
    for (const t of tries){
      const digits = (t.digits || '').slice(0, 3);
      const score = scoreCandidate(digits) + t.confidence * 20;
      if (!best || score > best.score){
        best = {
          value: digits,
          confidence: t.confidence,
          raw: t.raw,
          score
        };
      }
    }

    if (!best) return;

    setResult(best.value || '---', `候補: ${best.value || best.raw || '---'} / 信頼度 ${best.confidence.toFixed(2)}`);

    if (/^\d{3}$/.test(best.value)){
      pushRecent(best.value, best.confidence);
      const stable = decideStable();
      if (stable){
        const now = Date.now();
        if (stable.value !== lastAccepted || (now - lastAcceptedTime) > 2000){
          lastAccepted = stable.value;
          lastAcceptedTime = now;
          addLog(`認識: ${stable.value}  信頼度=${stable.confAvg.toFixed(2)}  安定=${stable.count}票`);
        }
      }
    }
  }

  async function loop(){
    if (!running) return;
    if (!ocrBusy && video.readyState >= 2){
      ocrBusy = true;
      try{
        await processFrame();
      }catch(err){
        console.error(err);
      }finally{
        ocrBusy = false;
      }
    }
    setTimeout(loop, 650);
  }

  startBtn.addEventListener('click', async () => {
    if (running) stopCamera();
    else await startCamera();
  });

  clearBtn.addEventListener('click', () => {
    logEl.textContent = '';
    recent.length = 0;
    lastAccepted = '';
    lastAcceptedTime = 0;
    setResult('---', '候補: --- / 信頼度 ---');
  });

  window.addEventListener('beforeunload', () => {
    stopCamera();
  });
})();
</script>
</body>
</html>
