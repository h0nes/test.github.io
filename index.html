<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <title>POS Assist System β</title>

  <style>
    :root{
      --bg:#0b0f16;
      --panel:#141b27;
      --panel2:#1b2332;
      --key:#2a3445;
      --text:#ffffff;
      --sub:#b8c2d0;
      --blue:#56a8ff;
      --red:#ff6677;
      --green:#49e09b;
      --display:#050912;
      --border:#334157;
      --shadow:0 10px 28px rgba(0,0,0,.35);
      --radius:18px;
      --gap:10px;

      --seat-vacant:#39c46a;
      --seat-nosmoke:#3d8cff;
      --seat-smoke:#9b59ff;
      --seat-leave:#ff5a6e;
      --seat-out:#ff9f43;
      --seat-enter:#2ec9c3;
      --seat-order:#f4c542;

      --macro-neutral:#6b7c99;
      --fn:#5f708c;
      --select:#2f4158;
      --soft:#20293a;
      --soft2:#283246;
      --gold:#f6c85d;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      -webkit-touch-callout:none;
      -webkit-user-select:none;
      user-select:none;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      touch-action:manipulation;
      overscroll-behavior:none;
      position:fixed;
    }

    body{
      padding:8px;
    }

    .app{
      width:100%;
      max-width:560px;
      height:calc(100dvh - 16px);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:8px;
      overflow:hidden;
    }

    .card{
      background:var(--panel);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:10px;
      overflow:hidden;
      flex:0 0 auto;
    }

    .title{
      font-size:clamp(16px, 4vw, 24px);
      font-weight:900;
      margin-bottom:8px;
      line-height:1.1;
      letter-spacing:.01em;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:6px;
      align-items:center;
    }

    .status{
      min-height:36px;
      background:var(--panel2);
      border-radius:14px;
      border:1px solid rgba(255,255,255,.04);
      color:var(--sub);
      display:flex;
      align-items:center;
      padding:0 10px;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
      font-size:12px;
    }

    .mini-btn{
      height:36px;
      min-width:66px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-size:14px;
      font-weight:900;
      padding:0 10px;
      box-shadow:var(--shadow);
      touch-action:manipulation;
      position:relative;
      overflow:hidden;
      isolation:isolate;
      transition:transform .08s ease, filter .12s ease, box-shadow .12s ease;
    }

    .connect{ background:var(--blue); }
    .disconnect{ background:var(--red); }

    .pad-card{
      flex:1 1 auto;
      display:flex;
      flex-direction:column;
      min-height:0;
      position:relative;
    }

    .pad-grid{
      flex:1 1 auto;
      min-height:0;
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      grid-template-rows:repeat(6, 1fr);
      gap:var(--gap);
    }

    .key,
    .display-cell,
    .flow-btn,
    .age-btn,
    .small-btn,
    .select-pill,
    .choice-chip,
    .option-btn,
    .room-btn,
    .course-btn{
      border:none;
      border-radius:16px;
      min-height:0;
      box-shadow:var(--shadow);
    }

    .key,
    .flow-btn,
    .age-btn,
    .small-btn,
    .select-pill,
    .choice-chip,
    .option-btn,
    .room-btn,
    .course-btn{
      color:#fff;
      font-weight:900;
      touch-action:manipulation;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      line-height:1.12;
      padding:4px 8px;
      overflow:hidden;
      position:relative;
      isolation:isolate;
      transition:transform .08s ease, filter .12s ease, box-shadow .12s ease, border-color .12s ease, background .12s ease;
    }

    .key{
      background:var(--key);
      font-size:30px;
    }

    .num{
      font-size:clamp(30px, 8vw, 44px);
      font-weight:900;
      background:#2f3a4f;
    }

    .macro{
      font-weight:900;
      letter-spacing:-0.04em;
      color:#fff;
      text-shadow:0 1px 2px rgba(0,0,0,.28);
    }

    .macro.jp2{ font-size:clamp(30px, 8vw, 42px); }
    .macro.en3{ font-size:clamp(26px, 7vw, 36px); letter-spacing:-0.05em; }

    .macro-neutral{ background:var(--macro-neutral); }
    .macro-vacant{ background:var(--seat-vacant); }
    .macro-nosmoke{ background:var(--seat-nosmoke); }
    .macro-smoke{ background:var(--seat-smoke); }
    .macro-leave{ background:var(--seat-leave); }
    .macro-out{ background:var(--seat-out); }
    .macro-enter{ background:var(--seat-enter); }

    .macro-order{
      background:var(--seat-order);
      color:#2b2100;
      text-shadow:none;
    }

    .fn{
      background:var(--fn);
      font-size:clamp(22px, 5.5vw, 30px);
      font-weight:900;
    }

    .enter{
      background:var(--green);
      color:#072317;
      font-size:clamp(28px, 7vw, 38px);
      font-weight:900;
    }

    .display-cell{
      background:var(--display);
      border:2px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:clamp(34px, 9vw, 50px);
      font-weight:900;
      letter-spacing:.08em;
      font-variant-numeric:tabular-nums;
      color:#fff;
      grid-column:2 / span 2;
      padding-left:.08em;
    }

    .zero-wide{ grid-column:1 / span 3; }

    .flow-overlay{
      position:absolute;
      inset:10px;
      z-index:30;
      border-radius:20px;
      background:rgba(10, 15, 24, .975);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
      padding:12px;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .flow-overlay.hidden{ display:none; }

    .flow-screen{
      display:none;
      flex:1 1 auto;
      min-height:0;
      gap:10px;
      overflow:auto;
      padding-right:2px;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
      touch-action:pan-y;
    }

    .flow-screen.active{
      display:flex;
      flex-direction:column;
    }

    .flow-title{
      text-align:center;
      font-size:clamp(22px, 6.6vw, 34px);
      font-weight:900;
      letter-spacing:.02em;
      margin-top:4px;
      flex:0 0 auto;
    }

    .flow-subtitle{
      text-align:center;
      font-size:clamp(14px, 3.7vw, 18px);
      color:var(--sub);
      flex:0 0 auto;
    }

    .flow-menu{
      flex:1 1 auto;
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      align-content:start;
    }

    .flow-btn{
      min-height:72px;
      font-size:clamp(22px, 6vw, 30px);
      letter-spacing:.01em;
    }

    .flow-btn.guest{ background:var(--seat-enter); }
    .flow-btn.member{ background:var(--seat-nosmoke); }
    .flow-btn.cancel{ background:var(--red); }
    .flow-btn.back{ background:#55657e; }
    .flow-btn.primary{ background:var(--green); color:#072317; }

    .demographic-grid{
      flex:1 1 auto;
      min-height:0;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .demographic-col{
      min-height:0;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .demographic-title{
      text-align:center;
      font-size:clamp(22px, 6vw, 28px);
      font-weight:900;
      letter-spacing:.02em;
      flex:0 0 auto;
    }

    .age-list{
      display:grid;
      gap:10px;
      flex:1 1 auto;
      align-content:start;
    }

    .age-btn{
      min-height:56px;
      background:#324055;
      font-size:clamp(20px, 5.3vw, 28px);
    }

    .flow-footer{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:10px;
      flex:0 0 auto;
    }

    .detail-panel{
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .entry-summary{
      background:rgba(255,255,255,.05);
      border-radius:14px;
      padding:10px 12px;
      color:#fff;
      font-size:14px;
      line-height:1.45;
      border:1px solid rgba(255,255,255,.08);
    }

    .entry-summary strong{
      display:block;
      font-size:16px;
      margin-bottom:2px;
    }

    .detail-label{
      font-size:18px;
      font-weight:900;
      letter-spacing:.01em;
    }

    .detail-label.smallish{
      font-size:15px;
      color:var(--sub);
    }

    .seat-choice-row,
    .dual-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .choice-chip{
      min-height:54px;
      font-size:22px;
      background:var(--select);
      border:1px solid rgba(255,255,255,.08);
    }

    .choice-chip.active-nosmoke{
      background:var(--seat-nosmoke);
      border-color:rgba(255,255,255,.22);
    }

    .choice-chip.active-smoke{
      background:var(--seat-smoke);
      border-color:rgba(255,255,255,.22);
    }

    .select-block{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .select-pill{
      min-height:64px;
      background:var(--soft2);
      border:1px solid rgba(255,255,255,.08);
      font-size:clamp(20px, 5.3vw, 26px);
      justify-content:space-between;
      padding:0 16px;
    }

    .select-pill .hint{
      color:#fff;
      font-weight:900;
    }

    .select-pill .value{
      color:#fff;
      font-weight:900;
      width:100%;
      text-align:center;
    }

    .select-pill.selected{
      background:#355070;
      border-color:rgba(255,255,255,.18);
    }

    .not-impl{
      min-height:56px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px dashed rgba(255,255,255,.15);
      color:var(--sub);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 10px;
      text-align:center;
      font-size:15px;
    }

    .helper-note{
      text-align:center;
      color:var(--sub);
      font-size:13px;
      line-height:1.4;
    }

    .option-grid,
    .room-grid,
    .course-list-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      align-content:start;
    }

    .single-col-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      align-content:start;
    }

    .option-btn,
    .room-btn,
    .course-btn,
    .small-btn{
      min-height:58px;
      background:var(--select);
      border:1px solid rgba(255,255,255,.08);
      font-size:clamp(19px, 5vw, 26px);
    }

    .room-btn,
    .course-btn{
      min-height:54px;
      font-size:clamp(18px, 4.9vw, 24px);
    }

    .room-grid,
    .course-list-grid,
    .single-col-grid,
    .option-grid,
    .demographic-grid,
    .age-list{
      touch-action:pan-y;
    }

    .small-btn{
      background:#3a4a62;
    }

    .wide-span{ grid-column:1 / -1; }

    .section-frame{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .section-caption{
      text-align:center;
      font-size:clamp(20px, 5.5vw, 28px);
      font-weight:900;
      letter-spacing:.02em;
    }

    .section-note{
      text-align:center;
      color:var(--sub);
      font-size:13px;
      line-height:1.35;
    }

    .holiday-badge{
      align-self:center;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(246,200,93,.12);
      border:1px solid rgba(246,200,93,.28);
      color:#ffe7a8;
      font-size:12px;
      font-weight:800;
      line-height:1.2;
    }

    .key::before,
    .mini-btn::before,
    .flow-btn::before,
    .age-btn::before,
    .small-btn::before,
    .select-pill::before,
    .choice-chip::before,
    .option-btn::before,
    .room-btn::before,
    .course-btn::before{
      content:"";
      position:absolute;
      inset:-35%;
      background:
        linear-gradient(115deg,
          rgba(255,255,255,0) 28%,
          rgba(255,255,255,.18) 42%,
          rgba(255,255,255,.78) 50%,
          rgba(255,255,255,.18) 58%,
          rgba(255,255,255,0) 72%);
      transform:translateX(-135%) skewX(-18deg);
      opacity:0;
      pointer-events:none;
      z-index:1;
      mix-blend-mode:screen;
    }

    .key > *,
    .mini-btn > *,
    .flow-btn > *,
    .age-btn > *,
    .small-btn > *,
    .select-pill > *,
    .choice-chip > *,
    .option-btn > *,
    .room-btn > *,
    .course-btn > *{
      position:relative;
      z-index:2;
    }

    .key:active,
    .mini-btn:active,
    .flow-btn:active,
    .age-btn:active,
    .small-btn:active,
    .select-pill:active,
    .choice-chip:active,
    .option-btn:active,
    .room-btn:active,
    .course-btn:active,
    .key.pressing,
    .mini-btn.pressing,
    .flow-btn.pressing,
    .age-btn.pressing,
    .small-btn.pressing,
    .select-pill.pressing,
    .choice-chip.pressing,
    .option-btn.pressing,
    .room-btn.pressing,
    .course-btn.pressing{
      transform:scale(0.97);
      filter:brightness(1.18) saturate(1.08);
      box-shadow:0 6px 18px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.18);
    }

    .key.flash::before,
    .mini-btn.flash::before,
    .flow-btn.flash::before,
    .age-btn.flash::before,
    .small-btn.flash::before,
    .select-pill.flash::before,
    .choice-chip.flash::before,
    .option-btn.flash::before,
    .room-btn.flash::before,
    .course-btn.flash::before{
      animation:keyFlash .28s ease-out;
    }

    @keyframes keyFlash{
      0%{ opacity:0; transform:translateX(-145%) skewX(-18deg); }
      18%{ opacity:1; }
      100%{ opacity:0; transform:translateX(145%) skewX(-18deg); }
    }

    @media (max-width:430px){
      .pad-grid{ gap:8px; }
      .title{ font-size:clamp(15px, 3.8vw, 20px); }
      .status{ font-size:11px; }
      .mini-btn{ font-size:13px; }
      .num{ font-size:clamp(28px, 8.5vw, 40px); }
      .macro.jp2{ font-size:clamp(28px, 8vw, 38px); }
      .macro.en3{ font-size:clamp(24px, 6.6vw, 32px); }
      .fn{ font-size:clamp(18px, 5vw, 24px); }
      .enter{ font-size:clamp(24px, 6.8vw, 34px); }
      .display-cell{ font-size:clamp(30px, 8.5vw, 44px); }
      .flow-btn{ min-height:64px; }
      .age-btn,
      .option-btn,
      .room-btn,
      .course-btn,
      .small-btn{ min-height:52px; }
      .select-pill{ min-height:58px; }
      .demographic-col,
      .section-frame,
      .detail-panel{ padding:10px; }
      .flow-overlay{ padding:10px; }
      .detail-label{ font-size:17px; }
      .detail-label.smallish{ font-size:14px; }
      .helper-note{ font-size:12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="title">POS Assist System</div>

      <div class="topbar">
        <div id="status" class="status">未接続</div>
        <button class="mini-btn connect app-btn" data-action="connect">接続</button>
        <button class="mini-btn disconnect app-btn" data-action="disconnect">切断</button>
      </div>
    </div>

    <div class="card pad-card">
      <div class="pad-grid">
        <button class="key macro jp2 macro-vacant app-btn" data-action="macro" data-value="MACRO_A">空席</button>
        <button class="key macro jp2 macro-nosmoke app-btn" data-action="macro" data-value="MACRO_B">禁煙</button>
        <button class="key macro jp2 macro-smoke app-btn" data-action="macro" data-value="MACRO_C">喫煙</button>
        <button class="key macro jp2 macro-enter app-btn" data-action="open-enter-menu">入店</button>

        <button class="key macro en3 macro-neutral app-btn" data-action="macro" data-value="MACRO_E">ESC</button>
        <div id="display" class="display-cell">000</div>
        <button class="key fn app-btn" data-action="clear">クリア</button>

        <button class="key num app-btn" data-action="append" data-value="7">7</button>
        <button class="key num app-btn" data-action="append" data-value="8">8</button>
        <button class="key num app-btn" data-action="append" data-value="9">9</button>
        <button class="key macro jp2 macro-leave app-btn" data-action="macro" data-value="MACRO_F">退店</button>

        <button class="key num app-btn" data-action="append" data-value="4">4</button>
        <button class="key num app-btn" data-action="append" data-value="5">5</button>
        <button class="key num app-btn" data-action="append" data-value="6">6</button>
        <button class="key macro jp2 macro-out app-btn" data-action="macro" data-value="MACRO_G">外出</button>

        <button class="key num app-btn" data-action="append" data-value="1">1</button>
        <button class="key num app-btn" data-action="append" data-value="2">2</button>
        <button class="key num app-btn" data-action="append" data-value="3">3</button>
        <button class="key macro jp2 macro-order app-btn" data-action="macro" data-value="MACRO_H">注文</button>

        <button class="key num zero-wide app-btn" data-action="append" data-value="0">0</button>
        <button class="key enter app-btn" data-action="enterkey">ENT</button>
      </div>

      <div id="enterFlow" class="flow-overlay hidden">
        <div id="enterScreenSelect" class="flow-screen active">
          <div class="flow-title">入店</div>
          <div class="flow-subtitle">入店区分を選択してください</div>
          <div class="flow-menu">
            <button class="flow-btn guest app-btn" data-action="enter-flow-option" data-value="guest">非会員</button>
            <button class="flow-btn member app-btn" data-action="enter-flow-option" data-value="member">会員証読取済み</button>
            <button class="flow-btn cancel app-btn" data-action="close-enter-menu">キャンセル</button>
          </div>
        </div>

        <div id="enterScreenGuest" class="flow-screen">
          <div class="flow-title">非会員</div>
          <div class="flow-subtitle">性別と年代を選択してください</div>

          <div class="demographic-grid">
            <div class="demographic-col">
              <div class="demographic-title">男性</div>
              <div class="age-list">
                <button class="age-btn app-btn" data-action="enter-guest-select" data-gender="男性" data-age="10代">10代</button>
                <button class="age-btn app-btn" data-action="enter-guest-select" data-gender="男性" data-age="20代">20代</button>
                <button class="age-btn app-btn" data-action="enter-guest-select" data-gender="男性" data-age="30代">30代</button>
                <button class="age-btn app-btn" data-action="enter-guest-select" data-gender="男性" data-age="40代">40代</button>
                <button class="age-btn app-btn" data-action="enter-guest-select" data-gender="男性" data-age="50代">50代</button>
              </div>
            </div>

            <div class="demographic-col">
              <div class="demographic-title">女性</div>
              <div class="age-list">
                <button class="age-btn app-btn" data-action="enter-guest-select" data-gender="女性" data-age="10代">10代</button>
                <button class="age-btn app-btn" data-action="enter-guest-select" data-gender="女性" data-age="20代">20代</button>
                <button class="age-btn app-btn" data-action="enter-guest-select" data-gender="女性" data-age="30代">30代</button>
                <button class="age-btn app-btn" data-action="enter-guest-select" data-gender="女性" data-age="40代">40代</button>
                <button class="age-btn app-btn" data-action="enter-guest-select" data-gender="女性" data-age="50代">50代</button>
              </div>
            </div>
          </div>

          <div class="flow-footer">
            <button class="flow-btn back app-btn" data-action="enter-flow-back-select">戻る</button>
            <button class="flow-btn cancel app-btn" data-action="close-enter-menu">キャンセル</button>
          </div>
        </div>

                <div id="enterScreenDetails" class="flow-screen">
          <div class="flow-title">入店</div>
          <div id="entrySummary" class="entry-summary"></div>

          <div class="detail-panel">

        setStatus("会員証読取済みを選択しました");

    async function handleEnterGuestSelect(button){
      enterState.customerType = "非会員";
      enterState.gender = button.dataset.gender || "";
      enterState.age = button.dataset.age || "";

      const guestCode = AGE_CODE_MAP[enterState.gender]?.[enterState.age];
      let sent = false;

      if (guestCode && rxChar) {
        sent = await executeGuestDemographicMacro(guestCode);
      }

      moveToEnterDetails();

      if (!guestCode) {
        setStatus(`非会員 ${enterState.gender} ${enterState.age} を選択しました`);
        return;
      }

      if (sent) {
        setStatus(`非会員 ${enterState.gender} ${enterState.age} を送信しました`);
      } else if (!rxChar) {
        setStatus(`非会員 ${enterState.gender} ${enterState.age} を選択しました（未接続）`);
      } else {
        setStatus(`非会員 ${enterState.gender} ${enterState.age} の送信に失敗しました`);
      }
    }

      enterState.smoking = value;

      if (ok) {
        setStatus(`空席確認: ${value} を送信しました`);
      } else if (!rxChar) {
        setStatus(`空席確認: ${value} を選択しました（未接続）`);
      } else {

      const source = COURSE_CATALOG[key] || [];
      const fixed = source.filter((item) => !item.bucket);
      const weekday = source.filter((item) => item.bucket === "weekday");
      const holiday = source.filter((item) => item.bucket === "holiday");
      return holidayPricing
        ? [...fixed, ...holiday, ...weekday]
        : [...fixed, ...weekday, ...holiday];
    }

      courseHolidayBadgeEl.textContent = enterState.holidayPricing
        ? "休日料金順で表示中"
        : "平日料金順で表示中";
      courseListGridEl.innerHTML = items.map((item) => {
        return `<button class="course-btn app-btn" data-action="select-course" data-value="${item.id}">${item.label}</button>`;
      }).join("");
      showEnterScreen("courseList");
    }

    function findCourseById(id){
      return Object.values(COURSE_CATALOG).flat().find((item) => item.id === id) || null;
    }

    function selectCourse(id){
      const course = findCourseById(id);
      if (!course) {
        setStatus("コース情報が見つかりませんでした");
        return;
      }

      enterState.selectedCourseId = course.id;
      enterState.selectedCourseDownCount = course.downCount;

      if (enterState.courseCategory === "private") {
        if (enterState.coursePeople === "1名") {
          enterState.selectedCourse = `個室${course.label}`;
        } else {
          const prefix = enterState.coursePeople === "2名" ? "2名個室" : "3名個室";
          enterState.selectedCourse = `${prefix}${course.label}`;
        }
      } else if (enterState.courseCategory === "lounge") {
        enterState.selectedCourse = `ラウンジ${course.label}`;
      } else {
        enterState.selectedCourse = course.label;
      }

      renderPickerState();
      showEnterScreen("details");
      setStatus(`コース: ${enterState.selectedCourse}`);
    }

    function normalizeRoomForMacro(roomText){
      const digits = (roomText.match(/\d+/g) || []).join("");
      if (!digits) return "";
      if (digits.length === 4) {
        return digits[0] + digits.slice(2);
      }
      return digits;
    }

    async function executeGuestDemographicMacro(code){
      if (!rxChar) return false;
      const steps = [
        `TYPE:${code}`,
        "KEY:ENTER",
        "KEY:SHIFT"
      ];
      return await sendCommandSequence(steps);
    }

    async function executeEnterProcess(){
      if (isExecutingEnter) return;

      if (!enterState.selectedRoom) {
        setStatus("部屋番号を選択してください");
        return;
      }
      if (!enterState.selectedCourseId || enterState.selectedCourseDownCount == null) {
        setStatus("コースを選択してください");
        return;
      }
      if (!rxChar) {
        setStatus("未接続のため入店処理を実行できません");
        return;
      }

      const roomCode = normalizeRoomForMacro(enterState.selectedRoom);
      if (!roomCode) {
        setStatus("この部屋番号はまだ入店処理に対応していません");
        return;
      }

      isExecutingEnter = true;

      const steps = [
        "KEY:SHIFT",
        `TYPE:${roomCode}`,
        "KEY:ENTER",
        "KEY:F1",
        `REPEAT:DOWN:${enterState.selectedCourseDownCount}`,
        "KEY:ENTER",
        "KEY:SHIFT"
      ];

      const ok = await sendCommandSequence(steps);
      isExecutingEnter = false;

      if (ok) {
        closeEnterMenu(`入店処理を実行しました: ${enterState.selectedRoom} / ${enterState.selectedCourse}`);
      } else {
        setStatus("入店処理の送信に失敗しました");
      }
    }

    function triggerPressEffect(button){
      button.classList.remove("flash");
      void button.offsetWidth;
      button.classList.add("flash");
    }

    function setPressing(button, isPressing){
      if (button) button.classList.toggle("pressing", isPressing);
    }

    function clearAllPressing(){
      document.querySelectorAll(".pressing").forEach((el) => el.classList.remove("pressing"));
    }

    async function connectBLE(){
      try{
        setStatus("BLEデバイスを検索中...");
        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }]
        });
        setStatus("接続中: " + (device.name || "名称不明"));
        device.addEventListener("gattserverdisconnected", onDisconnected);
        server = await device.gatt.connect();
        service = await server.getPrimaryService(SERVICE_UUID);
        rxChar = await service.getCharacteristic(RX_UUID);
        setStatus("接続完了: " + (device.name || "名称不明"));
      }catch(e){
        setStatus("接続失敗: " + (((e && (e.message || e.name)) || String(e))));
      }
    }

    function onDisconnected(){
      setStatus("切断されました");
      server = null;
      service = null;
      rxChar = null;
      isExecutingEnter = false;
    }

    async function disconnectBLE(){
      try{
        if(device && device.gatt && device.gatt.connected){
          device.gatt.disconnect();
        }
        device = null;
        server = null;
        service = null;
        rxChar = null;
        isExecutingEnter = false;
        setStatus("手動で切断しました");
      }catch(e){
        setStatus("切断失敗: " + (((e && (e.message || e.name)) || String(e))));
      }
    }

    async function sendText(text, options = {}){
      const quiet = !!options.quiet;

      if(!rxChar){
        if (!quiet) setStatus("未接続のため送信できません");
        return false;
      }

      try{
        const data = new TextEncoder().encode(text);
        await rxChar.writeValue(data);
        if (!quiet) {
          setStatus("送信: " + text.replace(/\n/g, "\\n"));
        }
        return true;
      }catch(e){
        if (!quiet) {
          setStatus("送信失敗: " + (((e && (e.message || e.name)) || String(e))));
        }
        return false;
      }
    }

    async function sendCommandSequence(commands){
      for (const command of commands) {
        const ok = await sendText(command + "\n", { quiet:true });
        if (!ok) return false;
      }
      return true;
    }

    async function sendEnterKey(){
      await sendText("MACRO_ENT\n");
    }

    async function sendMacro(name, options = {}){
      const quiet = !!options.quiet;
      const needsNumber = ["MACRO_F", "MACRO_G", "MACRO_H"];

      if (needsNumber.includes(name)) {
        if (inputBuffer.length === 0) {
          if (!quiet) setStatus("番号が未入力です");
          return false;
        }

        const ok1 = await sendText("NUM:" + inputBuffer + "\n", { quiet });
        if (!ok1) return false;

        const ok2 = await sendText(name + "\n", { quiet });
        if (!ok2) return false;

        clearInput();
        return true;
      }

      return await sendText(name + "\n", { quiet });
    }

    function formatDateKey(date){
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function startOfDay(date){
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function addDays(date, days){
      const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      d.setDate(d.getDate() + days);
      return d;
    }

    function nthMonday(year, monthIndex, nth){
      const first = new Date(year, monthIndex, 1);
      const firstDay = first.getDay();
      const delta = (8 - firstDay) % 7;
      return 1 + delta + (nth - 1) * 7;
    }

    function vernalEquinoxDay(year){
      return Math.floor(20.8431 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
    }

    function autumnEquinoxDay(year){
      return Math.floor(23.2488 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
    }

    function addHoliday(set, year, monthIndex, day){
      set.add(formatDateKey(new Date(year, monthIndex, day)));
    }

    function getJapaneseHolidaySet(year){
      if (holidayCache.has(year)) return holidayCache.get(year);

      const set = new Set();
      addHoliday(set, year, 0, 1);
      addHoliday(set, year, 1, 11);
      addHoliday(set, year, 1, 23);
      addHoliday(set, year, 3, 29);
      addHoliday(set, year, 4, 3);
      addHoliday(set, year, 4, 4);
      addHoliday(set, year, 4, 5);
      addHoliday(set, year, 7, 11);
      addHoliday(set, year, 10, 3);
      addHoliday(set, year, 10, 23);

      addHoliday(set, year, 0, nthMonday(year, 0, 2));
      addHoliday(set, year, 6, nthMonday(year, 6, 3));
      addHoliday(set, year, 8, nthMonday(year, 8, 3));
      addHoliday(set, year, 9, nthMonday(year, 9, 2));

      addHoliday(set, year, 2, vernalEquinoxDay(year));
      addHoliday(set, year, 8, autumnEquinoxDay(year));

      for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
        const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
        for (let day = 2; day < daysInMonth; day++) {
          const cur = new Date(year, monthIndex, day);
          const key = formatDateKey(cur);
          if (set.has(key)) continue;
          const prev = formatDateKey(addDays(cur, -1));
          const next = formatDateKey(addDays(cur, 1));
          if (set.has(prev) && set.has(next)) {
            set.add(key);
          }
        }
      }

      const sundayHolidays = Array.from(set).sort();
      for (const key of sundayHolidays) {
        const date = new Date(key + "T00:00:00");
        if (date.getDay() !== 0) continue;
        let probe = addDays(date, 1);
        while (set.has(formatDateKey(probe))) {
          probe = addDays(probe, 1);
        }
        set.add(formatDateKey(probe));
      }

      for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
        const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
        for (let day = 2; day < daysInMonth; day++) {
          const cur = new Date(year, monthIndex, day);
          const key = formatDateKey(cur);
          if (set.has(key)) continue;
          const prev = formatDateKey(addDays(cur, -1));
          const next = formatDateKey(addDays(cur, 1));
          if (set.has(prev) && set.has(next)) {
            set.add(key);
          }
        }
      }

      holidayCache.set(year, set);
      return set;
    }

    function isHolidayDay(date){
      const day = date.getDay();
      if (day === 0 || day === 6) return true;
      const yearSet = getJapaneseHolidaySet(date.getFullYear());
      return yearSet.has(formatDateKey(date));
    }

    function isHolidayPricingPeriod(now){
      const today = startOfDay(now);
      for (let offset = -8; offset <= 8; offset++) {
        const probe = addDays(today, offset);
        if (!isHolidayDay(probe)) continue;

        const prev = addDays(probe, -1);
        if (isHolidayDay(prev)) continue;

        let end = new Date(probe.getFullYear(), probe.getMonth(), probe.getDate());
        while (isHolidayDay(addDays(end, 1))) {
          end = addDays(end, 1);
        }

        const periodStart = new Date(prev.getFullYear(), prev.getMonth(), prev.getDate(), 18, 0, 0, 0);
        const periodEnd = new Date(end.getFullYear(), end.getMonth(), end.getDate(), 18, 0, 0, 0);
        if (now >= periodStart && now < periodEnd) {
          return true;
        }
      }
      return false;
    }

    function runAction(button){
      const action = button.dataset.action;
      const value = button.dataset.value || "";

      switch(action){
        case "connect":
          connectBLE();
          break;
        case "disconnect":
          disconnectBLE();
          break;
        case "append":
          appendInput(value);
          break;
        case "clear":
          clearInput();
          break;
        case "enterkey":
          sendEnterKey();
          break;
        case "macro":
          sendMacro(value);
          break;
        case "open-enter-menu":
          openEnterMenu();
          break;
        case "close-enter-menu":
          closeEnterMenu("入店メニューを閉じました");
          break;
        case "enter-flow-option":
          handleEnterFlowOption(value);
          break;
        case "enter-guest-select":
          handleEnterGuestSelect(button);
          break;
        case "enter-flow-back-select":
          showEnterScreen("select");
          setStatus("入店区分の選択に戻りました");
          break;
        case "set-smoking":
          setSmoking(value);
          break;
        case "open-room-menu":
          showEnterScreen("roomMenu");
          setStatus("部屋番号の選択を開きました");
          break;
        case "back-to-details":
          showEnterScreen("details");
          setStatus("入店画面に戻りました");
          break;
        case "back-to-room-menu":
          showEnterScreen("roomMenu");
          setStatus("部屋カテゴリ選択に戻りました");
          break;
        case "open-room-group":
          openRoomGroup(value);
          break;
        case "select-room":
          selectRoom(value);
          break;
        case "room-list-back":
          showEnterScreen("roomMenu");
          setStatus("部屋カテゴリ選択に戻りました");
          break;
        case "open-course-menu":
          showEnterScreen("courseMenu");
          setStatus("コース選択を開きました");
          break;
        case "back-to-course-menu":
          showEnterScreen("courseMenu");
          setStatus("コースカテゴリ選択に戻りました");
          break;
        case "open-course-category":
          openCourseCategory(value);
          break;
        case "open-private-people":
          openPrivatePeople(value);
          break;
        case "select-course":
          selectCourse(value);
          break;
        case "course-list-back": {
          const backTarget = button.dataset.backTarget || "courseMenu";
          if (backTarget === "privateCount") {
            showEnterScreen("privateCount");
            setStatus("人数選択に戻りました");
          } else {
            showEnterScreen("courseMenu");
            setStatus("コースカテゴリ選択に戻りました");
          }
          break;
        }
        case "execute-enter-process":
          executeEnterProcess();
          break;
      }
    }

    function getButtonFromEvent(event){
      return event.target.closest(".app-btn");
    }

    document.addEventListener("touchstart", function(event){
      const button = getButtonFromEvent(event);
      if (!button) return;
      const touch = event.touches && event.touches[0];
      activeTouchButton = button;
      touchStartX = touch ? touch.clientX : 0;
      touchStartY = touch ? touch.clientY : 0;
      touchMoved = false;
      event.stopPropagation();
      setPressing(button, true);
    }, { passive:false });

    document.addEventListener("click", function(event){
      const button = getButtonFromEvent(event);
      if (!button) return;
      if (cancelNextClick.has(button)) {
        cancelNextClick.delete(button);
        event.preventDefault();
        event.stopPropagation();
        return;
      }
      event.preventDefault();
      event.stopPropagation();
      triggerPressEffect(button);
      runAction(button);
    }, { passive:false });

    document.addEventListener("touchend", function(event){
      if (activeTouchButton && touchMoved) {
        cancelNextClick.add(activeTouchButton);
      }
      activeTouchButton = null;
      touchMoved = false;
      clearAllPressing();
      const now = Date.now();
      if(now - lastTouchEnd <= 350){
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive:false });

    document.addEventListener("touchcancel", function(){
      activeTouchButton = null;
      touchMoved = false;
      clearAllPressing();
    }, { passive:false });

    document.addEventListener("mouseup", function(){
      clearAllPressing();
    }, { passive:false });

    document.addEventListener("mouseleave", function(){
      clearAllPressing();
    }, { passive:false });

    document.addEventListener("animationend", function(event){
      const button = getButtonFromEvent(event);
      if (button) button.classList.remove("flash");
    });

    document.addEventListener("touchmove", function(event){
      const touch = event.touches && event.touches[0];
      if (activeTouchButton && touch) {
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        if (Math.abs(dx) > TOUCH_SCROLL_THRESHOLD || Math.abs(dy) > TOUCH_SCROLL_THRESHOLD) {
          touchMoved = true;
          cancelNextClick.add(activeTouchButton);
          setPressing(activeTouchButton, false);
        }
      }

      if (event.target.closest(".flow-screen.active")) {
        return;
      }
      event.preventDefault();
    }, { passive:false });

    document.addEventListener("gesturestart", function(event){
      event.preventDefault();
    }, { passive:false });

    document.addEventListener("gesturechange", function(event){
      event.preventDefault();
    }, { passive:false });

    document.addEventListener("gestureend", function(event){
      event.preventDefault();
    }, { passive:false });

    document.addEventListener("dblclick", function(event){
      event.preventDefault();
    }, { passive:false });

    updateDisplay();
    resetEnterState();
  </script>
</body>
