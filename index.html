<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>XIAO Keypad</title>
  <style>
    :root{
      --bg:#000;
      --display:#fff;
      --num:#2b2b2e;
      --func:#5c5c5f;
      --enter:#ff9f0a;
      --gap:12px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:var(--bg);
      overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:stretch;
    }

    .app{
      width:100%;
      max-width:430px;
      height:100dvh;
      background:#000;
      padding:
        calc(var(--safe-top) + 12px)
        12px
        calc(var(--safe-bottom) + 16px);
      display:flex;
      flex-direction:column;
    }

    .topbar{
      display:flex;
      gap:8px;
      margin-bottom:10px;
    }

    .small-btn{
      border:none;
      border-radius:14px;
      padding:10px 14px;
      font-size:14px;
      color:#fff;
      background:#1f6feb;
    }

    .small-btn.secondary{
      background:#444;
    }

    .status{
      min-height:20px;
      color:#8e8e93;
      font-size:13px;
      margin-bottom:8px;
    }

    .display-wrap{
      flex:1;
      display:flex;
      align-items:flex-end;
      justify-content:flex-end;
      padding:0 8px 12px 8px;
      min-height:140px;
    }

    .display{
      color:var(--display);
      font-size:clamp(42px, 12vw, 84px);
      font-weight:300;
      line-height:1;
      text-align:right;
      width:100%;
      word-break:break-all;
    }

    .keys{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:var(--gap);
      padding-bottom:4px;
    }

    .key{
      border:none;
      border-radius:999px;
      aspect-ratio:1 / 1;
      font-size:clamp(28px, 7vw, 40px);
      color:#fff;
      background:var(--num);
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
    }

    .key.func{
      background:var(--func);
      color:#fff;
    }

    .key.enter{
      background:var(--enter);
      color:#fff;
      font-size:clamp(22px, 5.2vw, 30px);
      line-height:1.05;
      text-align:center;
      white-space:pre-line;
    }

    .key:active{
      filter:brightness(1.18);
      transform:scale(0.98);
    }

    .zero{
      grid-column:2;
    }

    .placeholder{
      visibility:hidden;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button class="small-btn" id="connectBtn">接続</button>
      <button class="small-btn secondary" id="disconnectBtn">切断</button>
    </div>

    <div class="status" id="status">未接続</div>

    <div class="display-wrap">
      <div class="display" id="display">0</div>
    </div>

    <div class="keys">
      <button class="key" data-key="7">7</button>
      <button class="key" data-key="8">8</button>
      <button class="key" data-key="9">9</button>
      <button class="key func" id="btnA">A</button>

      <button class="key" data-key="4">4</button>
      <button class="key" data-key="5">5</button>
      <button class="key" data-key="6">6</button>
      <button class="key func" id="btnB">B</button>

      <button class="key" data-key="1">1</button>
      <button class="key" data-key="2">2</button>
      <button class="key" data-key="3">3</button>
      <button class="key enter" id="enterBtn">Ent
er</button>

      <div class="placeholder"></div>
      <button class="key zero" data-key="0">0</button>
      <div class="placeholder"></div>
      <div class="placeholder"></div>
    </div>
  </div>

  <script>
    const NUS_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const NUS_RX_CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

    let device = null;
    let server = null;
    let rxChar = null;
    let currentInput = "";

    const display = document.getElementById("display");
    const statusEl = document.getElementById("status");

    function renderDisplay(){
      display.textContent = currentInput === "" ? "0" : currentInput;
    }

    function setStatus(msg){
      statusEl.textContent = msg;
    }

    async function connectBLE(){
      try{
        setStatus("検索中...");
        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [NUS_SERVICE_UUID] }],
          optionalServices: [NUS_SERVICE_UUID]
        });

        device.addEventListener("gattserverdisconnected", () => {
          rxChar = null;
          server = null;
          setStatus("切断されました");
        });

        setStatus("接続中...");
        server = await device.gatt.connect();
        const service = await server.getPrimaryService(NUS_SERVICE_UUID);
        rxChar = await service.getCharacteristic(NUS_RX_CHAR_UUID);

        setStatus(`接続済み: ${device.name || "XIAO"}`);
      }catch(e){
        console.error(e);
        setStatus("接続失敗: " + e.message);
      }
    }

    async function disconnectBLE(){
      try{
        if(device?.gatt?.connected){
          device.gatt.disconnect();
        }
      }catch(e){
        console.error(e);
      }
      rxChar = null;
      server = null;
      setStatus("未接続");
    }

    async function sendToXIAO(text){
      if(!rxChar){
        setStatus("未接続です");
        return false;
      }

      try{
        await rxChar.writeValue(new TextEncoder().encode(text));
        setStatus(`送信: ${text.trim()}`);
        return true;
      }catch(e){
        console.error(e);
        setStatus("送信失敗: " + e.message);
        return false;
      }
    }

    function appendDigit(d){
      if(currentInput.length >= 12) return;
      if(currentInput === "0") currentInput = "";
      currentInput += d;
      renderDisplay();
    }

    function backspace(){
      currentInput = currentInput.slice(0, -1);
      renderDisplay();
    }

    function clearAll(){
      currentInput = "";
      renderDisplay();
    }

    async function enterInput(){
      if(currentInput === ""){
        setStatus("入力が空です");
        return;
      }

      const ok = await sendToXIAO(currentInput + "\n");
      if(ok){
        currentInput = "";
        renderDisplay();
      }
    }

    document.querySelectorAll("[data-key]").forEach(btn=>{
      btn.addEventListener("click", ()=>appendDigit(btn.dataset.key));
    });

    document.getElementById("btnA").addEventListener("click", backspace);
    document.getElementById("btnB").addEventListener("click", clearAll);
    document.getElementById("enterBtn").addEventListener("click", enterInput);
    document.getElementById("connectBtn").addEventListener("click", connectBLE);
    document.getElementById("disconnectBtn").addEventListener("click", disconnectBLE);

    renderDisplay();
  </script>
</body>
</html>
