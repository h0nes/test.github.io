<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <title>XIAO BLE Keypad</title>

  <style>
    :root{
      --bg:#0b0f16;
      --panel:#141b27;
      --panel2:#1b2332;
      --key:#2a3445;
      --text:#ffffff;
      --sub:#b8c2d0;
      --blue:#56a8ff;
      --red:#ff6677;
      --green:#49e09b;
      --macro:#5d6f89;
      --fn:#566781;
      --border:#334157;
      --shadow:0 10px 28px rgba(0,0,0,.35);
      --radius:18px;
      --gap:12px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      -webkit-touch-callout:none;
      -webkit-user-select:none;
      user-select:none;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      touch-action:manipulation;
      overscroll-behavior:none;
      position:fixed;
    }

    body{
      padding:10px;
    }

    .app{
      width:100%;
      max-width:560px;
      height:calc(100dvh - 20px);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      overflow:hidden;
    }

    .card{
      background:var(--panel);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:12px;
      overflow:hidden;
      flex:0 0 auto;
    }

    .card.header-card{
      padding-bottom:10px;
    }

    .title{
      font-size:clamp(20px, 4.8vw, 32px);
      font-weight:800;
      margin-bottom:10px;
      letter-spacing:.02em;
      line-height:1.15;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:8px;
      align-items:center;
    }

    .status{
      min-height:40px;
      background:var(--panel2);
      border-radius:14px;
      border:1px solid rgba(255,255,255,.04);
      color:var(--sub);
      display:flex;
      align-items:center;
      padding:0 12px;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
      font-size:14px;
    }

    .mini-btn{
      height:40px;
      min-width:74px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-size:16px;
      font-weight:800;
      padding:0 12px;
      box-shadow:var(--shadow);
      touch-action:none;
    }

    .connect{ background:var(--blue); }
    .disconnect{ background:var(--red); }

    .display-wrap{
      margin-top:10px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
    }

    .display-label{
      color:var(--sub);
      font-size:13px;
      margin-bottom:6px;
    }

    .display-box{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      flex:1;
    }

    .display{
      width:150px;
      min-height:62px;
      border-radius:16px;
      border:2px solid var(--border);
      background:#050912;
      padding:12px 14px;
      font-size:34px;
      font-weight:800;
      letter-spacing:.12em;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      font-variant-numeric: tabular-nums;
    }

    .pad-card{
      flex:1 1 auto;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .pad-title{
      font-size:18px;
      font-weight:800;
      margin-bottom:10px;
      flex:0 0 auto;
    }

    .pad-grid{
      flex:1 1 auto;
      min-height:0;
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      grid-template-rows:repeat(5, 1fr);
      gap:var(--gap);
    }

    .key{
      border:none;
      border-radius:18px;
      background:var(--key);
      color:#fff;
      font-size:28px;
      font-weight:800;
      box-shadow:var(--shadow);
      touch-action:none;
      min-height:0;
    }

    .fn{
      background:var(--fn);
      font-size:20px;
    }

    .macro{
      background:var(--macro);
      font-size:24px;
    }

    .enter{
      background:var(--green);
      color:#072317;
      font-size:22px;
    }

    .empty{
      visibility:hidden;
      pointer-events:none;
    }

    .key:active,
    .mini-btn:active{
      transform:scale(0.98);
    }

    @media (max-width:430px){
      body{
        padding:8px;
      }

      .app{
        height:calc(100dvh - 16px);
        gap:8px;
      }

      .card{
        padding:10px;
      }

      .title{
        font-size:clamp(18px, 4.6vw, 28px);
        margin-bottom:8px;
      }

      .topbar{
        gap:6px;
      }

      .status{
        min-height:38px;
        font-size:13px;
        padding:0 10px;
      }

      .mini-btn{
        height:38px;
        min-width:68px;
        font-size:15px;
        padding:0 10px;
      }

      .display{
        width:132px;
        min-height:56px;
        font-size:30px;
        padding:10px 12px;
      }

      .pad-title{
        font-size:17px;
        margin-bottom:8px;
      }

      .pad-grid{
        gap:10px;
      }

      .key{
        font-size:24px;
        border-radius:16px;
      }

      .fn{
        font-size:18px;
      }

      .macro{
        font-size:22px;
      }

      .enter{
        font-size:20px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card header-card">
      <div class="title">XIAO BLE テンキー + マクロパッド</div>

      <div class="topbar">
        <div id="status" class="status">未接続</div>
        <button class="mini-btn connect app-btn" data-action="connect">接続</button>
        <button class="mini-btn disconnect app-btn" data-action="disconnect">切断</button>
      </div>

      <div class="display-wrap">
        <div class="display-box">
          <div class="display-label">入力中</div>
          <div id="display" class="display"></div>
        </div>
      </div>
    </div>

    <div class="card pad-card">
      <div class="pad-title">テンキー</div>

      <div class="pad-grid">
        <button class="key app-btn" data-action="append" data-value="7">7</button>
        <button class="key app-btn" data-action="append" data-value="8">8</button>
        <button class="key app-btn" data-action="append" data-value="9">9</button>
        <button class="key macro app-btn" data-action="macro" data-value="MACRO_A">A</button>

        <button class="key app-btn" data-action="append" data-value="4">4</button>
        <button class="key app-btn" data-action="append" data-value="5">5</button>
        <button class="key app-btn" data-action="append" data-value="6">6</button>
        <button class="key macro app-btn" data-action="macro" data-value="MACRO_B">B</button>

        <button class="key app-btn" data-action="append" data-value="1">1</button>
        <button class="key app-btn" data-action="append" data-value="2">2</button>
        <button class="key app-btn" data-action="append" data-value="3">3</button>
        <button class="key macro app-btn" data-action="macro" data-value="MACRO_C">C</button>

        <button class="key fn app-btn" data-action="backspace">BS</button>
        <button class="key app-btn" data-action="append" data-value="0">0</button>
        <button class="key macro app-btn" data-action="macro" data-value="MACRO_D">D</button>
        <button class="key enter app-btn" data-action="send">Ent</button>

        <button class="key empty" tabindex="-1" aria-hidden="true"></button>
        <button class="key empty" tabindex="-1" aria-hidden="true"></button>
        <button class="key macro app-btn" data-action="macro" data-value="MACRO_E">E</button>
        <button class="key empty" tabindex="-1" aria-hidden="true"></button>
      </div>
    </div>
  </div>

  <script>
    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const RX_UUID      = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

    let device = null;
    let server = null;
    let service = null;
    let rxChar = null;
    let inputBuffer = "";
    let lastTouchEnd = 0;
    const handledTouches = new WeakSet();

    const statusEl = document.getElementById("status");
    const displayEl = document.getElementById("display");

    function setStatus(text){
      statusEl.textContent = text;
      console.log(text);
    }

    function updateDisplay(){
      displayEl.textContent = inputBuffer;
    }

    function appendInput(char){
      if (inputBuffer.length >= 3) return;
      inputBuffer += char;
      updateDisplay();
    }

    function backspaceInput(){
      inputBuffer = inputBuffer.slice(0, -1);
      updateDisplay();
    }

    function clearInput(){
      inputBuffer = "";
      updateDisplay();
    }

    async function connectBLE(){
      try{
        setStatus("BLEデバイスを検索中...");

        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }]
        });

        setStatus("接続中: " + (device.name || "名称不明"));

        device.addEventListener("gattserverdisconnected", onDisconnected);

        server = await device.gatt.connect();
        service = await server.getPrimaryService(SERVICE_UUID);
        rxChar = await service.getCharacteristic(RX_UUID);

        setStatus("接続完了: " + (device.name || "名称不明"));
      }catch(e){
        setStatus("接続失敗: " + (((e && (e.message || e.name)) || String(e))));
      }
    }

    function onDisconnected(){
      setStatus("切断されました");
      server = null;
      service = null;
      rxChar = null;
    }

    async function disconnectBLE(){
      try{
        if(device && device.gatt && device.gatt.connected){
          device.gatt.disconnect();
        }
        device = null;
        server = null;
        service = null;
        rxChar = null;
        setStatus("手動で切断しました");
      }catch(e){
        setStatus("切断失敗: " + (((e && (e.message || e.name)) || String(e))));
      }
    }

    async function sendText(text){
      if(!rxChar){
        setStatus("未接続のため送信できません");
        return false;
      }

      try{
        const data = new TextEncoder().encode(text);
        await rxChar.writeValue(data);
        setStatus("送信: " + text.replace(/\n/g, "\\n"));
        return true;
      }catch(e){
        setStatus("送信失敗: " + (((e && (e.message || e.name)) || String(e))));
        return false;
      }
    }

    async function sendCurrentInput(){
      if(inputBuffer.length === 0){
        setStatus("入力が空です");
        return;
      }

      const ok = await sendText("NUM:" + inputBuffer + "\n");
      if(ok){
        clearInput();
      }
    }

    async function sendMacro(name){
      await sendText(name + "\n");
    }

    function runAction(button){
      const action = button.dataset.action;
      const value = button.dataset.value || "";

      switch(action){
        case "connect":
          connectBLE();
          break;
        case "disconnect":
          disconnectBLE();
          break;
        case "append":
          appendInput(value);
          break;
        case "backspace":
          backspaceInput();
          break;
        case "send":
          sendCurrentInput();
          break;
        case "macro":
          sendMacro(value);
          break;
      }
    }

    function handlePress(event){
      const button = event.currentTarget;

      event.preventDefault();
      event.stopPropagation();

      if (event.type === "touchstart") {
        handledTouches.add(button);
      }

      if (event.type === "click" && handledTouches.has(button)) {
        handledTouches.delete(button);
        return;
      }

      runAction(button);
    }

    document.querySelectorAll(".app-btn").forEach((button) => {
      button.addEventListener("touchstart", handlePress, { passive:false });
      button.addEventListener("click", handlePress, { passive:false });
      button.addEventListener("dblclick", (e) => {
        e.preventDefault();
        e.stopPropagation();
      }, { passive:false });
    });

    document.addEventListener("touchmove", function(event){
      event.preventDefault();
    }, { passive:false });

    document.addEventListener("gesturestart", function(event){
      event.preventDefault();
    }, { passive:false });

    document.addEventListener("gesturechange", function(event){
      event.preventDefault();
    }, { passive:false });

    document.addEventListener("gestureend", function(event){
      event.preventDefault();
    }, { passive:false });

    document.addEventListener("dblclick", function(event){
      event.preventDefault();
    }, { passive:false });

    document.addEventListener("touchend", function(event){
      const now = Date.now();
      if(now - lastTouchEnd <= 350){
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive:false });

    updateDisplay();
  </script>
</body>
</html>
