<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluefy OCR Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background: #f4f4f9; }
        #video-container { position: relative; width: 100%; max-width: 500px; margin: auto; }
        video { width: 100%; border-radius: 8px; background: #000; }
        #overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 30%;
            border: 2px solid #00ff00; box-sizing: border-box;
            pointer-events: none;
        }
        button {
            margin-top: 20px; padding: 12px 24px;
            font-size: 16px; border: none; border-radius: 50px;
            background: #007aff; color: white; cursor: pointer;
        }
        button:disabled { background: #ccc; }
        #result-area {
            margin-top: 20px; padding: 15px; background: white;
            border-radius: 8px; min-height: 50px; border: 1px solid #ddd;
            word-wrap: break-word; text-align: left;
        }
        .loading { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <h2>文字読み取り (OCR)</h2>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div id="overlay"></div>
    </div>

    <button id="capture-btn">文字を読み取る</button>

    <div id="result-area">
        <p id="status">カメラを許可してください</p>
        <div id="text-output"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const status = document.getElementById('status');
        const output = document.getElementById('text-output');

        // 1. カメラの開始
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }, // 背面カメラ
                    audio: false
                });
                video.srcObject = stream;
                status.innerText = "カメラ準備完了";
            } catch (err) {
                status.innerText = "カメラの起動に失敗しました: " + err.message;
            }
        }

        // 2. OCR実行処理
        async function performOCR() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // ビデオの現在のフレームをCanvasに描画
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            status.innerText = "解析中... (数秒かかります)";
            captureBtn.disabled = true;
            output.innerText = "";

            try {
                // Tesseract.jsで解析（日本語 + 英語）
                const result = await Tesseract.recognize(
                    canvas.toDataURL('image/jpeg'),
                    'jpn+eng', 
                    { logger: m => console.log(m) }
                );

                status.innerText = "解析完了";
                output.innerText = result.data.text;
            } catch (error) {
                status.innerText = "エラーが発生しました";
                console.error(error);
            } finally {
                captureBtn.disabled = false;
            }
        }

        captureBtn.addEventListener('click', performOCR);

        // ページ読み込み時にカメラ起動
        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
