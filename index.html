<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluefy Continuous OCR Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background: #f4f4f9; }
        #video-container { position: relative; width: 100%; max-width: 500px; margin: auto; }
        video { width: 100%; border-radius: 8px; background: #000; }
        #overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 30%;
            border: 2px solid #00ff00; box-sizing: border-box;
            pointer-events: none;
        }
        button {
            margin-top: 20px; padding: 12px 24px;
            font-size: 16px; border: none; border-radius: 50px;
            background: #007aff; color: white; cursor: pointer;
        }
        button.stop { background: #ff3b30; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #result-area {
            margin-top: 20px; padding: 15px; background: white;
            border-radius: 8px; min-height: 50px; border: 1px solid #ddd;
            word-wrap: break-word; text-align: left;
            font-size: 18px; font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>連続文字読み取り (OCR)</h2>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div id="overlay"></div>
    </div>

    <button id="toggle-btn" disabled>準備中...</button>

    <div id="result-area">
        <p id="status" style="font-size: 14px; font-weight: normal; color: #666;">カメラとOCRエンジンを準備しています...</p>
        <div id="text-output"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const toggleBtn = document.getElementById('toggle-btn');
        const status = document.getElementById('status');
        const output = document.getElementById('text-output');

        let worker = null;
        let isScanning = false;

        // 1. カメラの開始
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "カメラの起動に失敗しました: " + err.message;
            }
        }

        // 2. OCRエンジンの初期化（使い回し用）
        async function initOCR() {
            try {
                worker = await Tesseract.createWorker('jpn+eng');
                status.innerText = "準備完了！開始ボタンを押してください。";
                toggleBtn.innerText = "読み取り開始";
                toggleBtn.disabled = false;
            } catch (err) {
                status.innerText = "OCRの準備に失敗しました。";
                console.error(err);
            }
        }

        // 3. 連続OCR処理のループ
        async function scanLoop() {
            // 停止フラグが立っていたらループを抜ける
            if (!isScanning) return;

            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // ビデオの現在のフレームをCanvasに描画
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            status.innerText = "解析中...";

            try {
                // 初期化したワーカーを使って解析
                const result = await worker.recognize(canvas);
                const text = result.data.text.trim();
                
                if (text) {
                    output.innerText = text;
                }
                status.innerText = "待機中 (0.5秒)...";
            } catch (error) {
                console.error(error);
                status.innerText = "エラーが発生しました";
            }

            // 処理が完了してから0.5秒(500ms)後に次のループを呼び出す
            setTimeout(scanLoop, 500);
        }

        // 4. ボタンのクリックイベント（開始/停止の切り替え）
        toggleBtn.addEventListener('click', () => {
            isScanning = !isScanning;
            
            if (isScanning) {
                toggleBtn.innerText = "読み取り停止";
                toggleBtn.classList.add("stop");
                scanLoop(); // ループ開始
            } else {
                toggleBtn.innerText = "読み取り開始";
                toggleBtn.classList.remove("stop");
                status.innerText = "一時停止中";
            }
        });

        // ページ読み込み時の処理
        window.addEventListener('load', async () => {
            await startCamera();
            await initOCR();
        });
    </script>
</body>
</html>
