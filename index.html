<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <title>XIAO BLE Macro Keypad</title>

  <style>
    :root{
      --bg:#0b0f16;
      --panel:#141b27;
      --panel2:#1b2332;
      --key:#2a3445;
      --text:#ffffff;
      --sub:#b8c2d0;
      --blue:#56a8ff;
      --red:#ff6677;
      --green:#49e09b;
      --display:#050912;
      --border:#334157;
      --shadow:0 10px 28px rgba(0,0,0,.35);
      --radius:18px;
      --gap:10px;

      --seat-vacant:#39c46a;
      --seat-nosmoke:#3d8cff;
      --seat-smoke:#9b59ff;
      --seat-leave:#ff5a6e;
      --seat-out:#ff9f43;
      --seat-enter:#2ec9c3;

      --macro-neutral:#6b7c99;
      --fn:#5f708c;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      -webkit-touch-callout:none;
      -webkit-user-select:none;
      user-select:none;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      touch-action:manipulation;
      overscroll-behavior:none;
      position:fixed;
    }

    body{
      padding:8px;
    }

    .app{
      width:100%;
      max-width:560px;
      height:calc(100dvh - 16px);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:8px;
      overflow:hidden;
    }

    .card{
      background:var(--panel);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:10px;
      overflow:hidden;
      flex:0 0 auto;
    }

    .title{
      font-size:clamp(16px, 4vw, 24px);
      font-weight:900;
      margin-bottom:8px;
      line-height:1.1;
      letter-spacing:.01em;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:6px;
      align-items:center;
    }

    .status{
      min-height:36px;
      background:var(--panel2);
      border-radius:14px;
      border:1px solid rgba(255,255,255,.04);
      color:var(--sub);
      display:flex;
      align-items:center;
      padding:0 10px;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
      font-size:12px;
    }

    .mini-btn{
      height:36px;
      min-width:66px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-size:14px;
      font-weight:900;
      padding:0 10px;
      box-shadow:var(--shadow);
      touch-action:none;
    }

    .connect{ background:var(--blue); }
    .disconnect{ background:var(--red); }

    .pad-card{
      flex:1 1 auto;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .pad-grid{
      flex:1 1 auto;
      min-height:0;
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      grid-template-rows:repeat(6, 1fr);
      gap:var(--gap);
    }

    .key,
    .display-cell{
      border:none;
      border-radius:16px;
      min-height:0;
      box-shadow:var(--shadow);
    }

    .key{
      background:var(--key);
      color:#fff;
      font-size:30px;
      font-weight:900;
      touch-action:none;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      line-height:1;
      padding:2px;
      overflow:hidden;
    }

    .num{
      font-size:clamp(30px, 8vw, 44px);
      font-weight:900;
      background:#2f3a4f;
    }

    .macro{
      font-weight:900;
      letter-spacing:-0.04em;
      color:#fff;
      text-shadow:0 1px 2px rgba(0,0,0,.28);
    }

    .macro.jp2{
      font-size:clamp(30px, 8vw, 42px);
    }

    .macro.en3{
      font-size:clamp(26px, 7vw, 36px);
      letter-spacing:-0.05em;
    }

    .macro-neutral{
      background:var(--macro-neutral);
    }

    .macro-vacant{
      background:var(--seat-vacant);
    }

    .macro-nosmoke{
      background:var(--seat-nosmoke);
    }

    .macro-smoke{
      background:var(--seat-smoke);
    }

    .macro-leave{
      background:var(--seat-leave);
    }

    .macro-out{
      background:var(--seat-out);
    }

    .macro-enter{
      background:var(--seat-enter);
    }

    .fn{
      background:var(--fn);
      font-size:clamp(28px, 7vw, 38px);
      font-weight:900;
    }

    .enter{
      background:var(--green);
      color:#072317;
      font-size:clamp(28px, 7vw, 38px);
      font-weight:900;
    }

    .display-cell{
      background:var(--display);
      border:2px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:clamp(34px, 9vw, 50px);
      font-weight:900;
      letter-spacing:.08em;
      font-variant-numeric:tabular-nums;
      color:#fff;
      grid-column:2 / span 2;
      padding-left:.08em;
    }

    .zero-wide{
      grid-column:1 / span 3;
    }

    .key:active,
    .mini-btn:active{
      transform:scale(0.98);
      filter:brightness(0.95);
    }

    @media (max-width:430px){
      .pad-grid{
        gap:8px;
      }

      .title{
        font-size:clamp(15px, 3.8vw, 20px);
      }

      .status{
        font-size:11px;
      }

      .mini-btn{
        font-size:13px;
      }

      .num{
        font-size:clamp(28px, 8.5vw, 40px);
      }

      .macro.jp2{
        font-size:clamp(28px, 8vw, 38px);
      }

      .macro.en3{
        font-size:clamp(24px, 6.6vw, 32px);
      }

      .fn{
        font-size:clamp(24px, 6.8vw, 34px);
      }

      .enter{
        font-size:clamp(24px, 6.8vw, 34px);
      }

      .display-cell{
        font-size:clamp(30px, 8.5vw, 44px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="title">POS ASSIST TOOL</div>

      <div class="topbar">
        <div id="status" class="status">未接続</div>
        <button class="mini-btn connect app-btn" data-action="connect">接続</button>
        <button class="mini-btn disconnect app-btn" data-action="disconnect">切断</button>
      </div>
    </div>

    <div class="card pad-card">
      <div class="pad-grid">
        <button class="key macro jp2 macro-vacant app-btn" data-action="macro" data-value="MACRO_A">空席</button>
        <button class="key macro jp2 macro-nosmoke app-btn" data-action="macro" data-value="MACRO_B">禁煙</button>
        <button class="key macro jp2 macro-smoke app-btn" data-action="macro" data-value="MACRO_C">喫煙</button>
        <button class="key macro jp2 macro-enter app-btn" data-action="macro" data-value="MACRO_D">入店</button>

        <button class="key macro en3 macro-neutral app-btn" data-action="macro" data-value="MACRO_E">ESC</button>
        <div id="display" class="display-cell">000</div>
        <button class="key fn app-btn" data-action="backspace">BS</button>

        <button class="key num app-btn" data-action="append" data-value="7">7</button>
        <button class="key num app-btn" data-action="append" data-value="8">8</button>
        <button class="key num app-btn" data-action="append" data-value="9">9</button>
        <button class="key macro jp2 macro-leave app-btn" data-action="macro" data-value="MACRO_F">退店</button>

        <button class="key num app-btn" data-action="append" data-value="4">4</button>
        <button class="key num app-btn" data-action="append" data-value="5">5</button>
        <button class="key num app-btn" data-action="append" data-value="6">6</button>
        <button class="key macro jp2 macro-out app-btn" data-action="macro" data-value="MACRO_G">外出</button>

        <button class="key num app-btn" data-action="append" data-value="1">1</button>
        <button class="key num app-btn" data-action="append" data-value="2">2</button>
        <button class="key num app-btn" data-action="append" data-value="3">3</button>
        <button class="key macro jp2 macro-neutral app-btn" data-action="macro" data-value="MACRO_H">注文</button>

        <button class="key num zero-wide app-btn" data-action="append" data-value="0">0</button>
        <button class="key enter app-btn" data-action="enterkey">ENT</button>
      </div>
    </div>
  </div>

  <script>
    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const RX_UUID      = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

    let device = null;
    let server = null;
    let service = null;
    let rxChar = null;
    let inputBuffer = "";
    let lastTouchEnd = 0;
    const handledTouches = new WeakSet();

    const statusEl = document.getElementById("status");
    const displayEl = document.getElementById("display");

    function setStatus(text){
      statusEl.textContent = text;
      console.log(text);
    }

    function updateDisplay(){
      displayEl.textContent = inputBuffer.length ? inputBuffer.padStart(3, "0") : "000";
    }

    function appendInput(char){
      if (inputBuffer.length >= 3) return;
      inputBuffer += char;
      updateDisplay();
    }

    function backspaceInput(){
      inputBuffer = inputBuffer.slice(0, -1);
      updateDisplay();
    }

    function clearInput(){
      inputBuffer = "";
      updateDisplay();
    }

    async function connectBLE(){
      try{
        setStatus("BLEデバイスを検索中...");

        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }]
        });

        setStatus("接続中: " + (device.name || "名称不明"));

        device.addEventListener("gattserverdisconnected", onDisconnected);

        server = await device.gatt.connect();
        service = await server.getPrimaryService(SERVICE_UUID);
        rxChar = await service.getCharacteristic(RX_UUID);

        setStatus("接続完了: " + (device.name || "名称不明"));
      }catch(e){
        setStatus("接続失敗: " + (((e && (e.message || e.name)) || String(e))));
      }
    }

    function onDisconnected(){
      setStatus("切断されました");
      server = null;
      service = null;
      rxChar = null;
    }

    async function disconnectBLE(){
      try{
        if(device && device.gatt && device.gatt.connected){
          device.gatt.disconnect();
        }
        device = null;
        server = null;
        service = null;
        rxChar = null;
        setStatus("手動で切断しました");
      }catch(e){
        setStatus("切断失敗: " + (((e && (e.message || e.name)) || String(e))));
      }
    }

    async function sendText(text){
      if(!rxChar){
        setStatus("未接続のため送信できません");
        return false;
      }

      try{
        const data = new TextEncoder().encode(text);
        await rxChar.writeValue(data);
        setStatus("送信: " + text.replace(/\n/g, "\\n"));
        return true;
      }catch(e){
        setStatus("送信失敗: " + (((e && (e.message || e.name)) || String(e))));
        return false;
      }
    }

    async function sendEnterKey(){
      await sendText("MACRO_ENT\n");
    }

    async function sendMacro(name){
      const needsNumber = ["MACRO_F", "MACRO_G", "MACRO_H"];

      if (needsNumber.includes(name)) {
        if (inputBuffer.length === 0) {
          setStatus("番号が未入力です");
          return;
        }

        const ok1 = await sendText("NUM:" + inputBuffer + "\n");
        if (!ok1) return;

        const ok2 = await sendText(name + "\n");
        if (!ok2) return;

        clearInput();
        return;
      }

      await sendText(name + "\n");
    }

    function runAction(button){
      const action = button.dataset.action;
      const value = button.dataset.value || "";

      switch(action){
        case "connect":
          connectBLE();
          break;
        case "disconnect":
          disconnectBLE();
          break;
        case "append":
          appendInput(value);
          break;
        case "backspace":
          backspaceInput();
          break;
        case "enterkey":
          sendEnterKey();
          break;
        case "macro":
          sendMacro(value);
          break;
      }
    }

    function handlePress(event){
      const button = event.currentTarget;

      event.preventDefault();
      event.stopPropagation();

      if (event.type === "touchstart") {
        handledTouches.add(button);
      }

      if (event.type === "click" && handledTouches.has(button)) {
        handledTouches.delete(button);
        return;
      }

      runAction(button);
    }

    document.querySelectorAll(".app-btn").forEach((button) => {
      button.addEventListener("touchstart", handlePress, { passive:false });
      button.addEventListener("click", handlePress, { passive:false });
      button.addEventListener("dblclick", (e) => {
        e.preventDefault();
        e.stopPropagation();
      }, { passive:false });
    });

    document.addEventListener("touchmove", function(event){
      event.preventDefault();
    }, { passive:false });

    document.addEventListener("gesturestart", function(event){
      event.preventDefault();
    }, { passive:false });

    document.addEventListener("gesturechange", function(event){
      event.preventDefault();
    }, { passive:false });

    document.addEventListener("gestureend", function(event){
      event.preventDefault();
    }, { passive:false });

    document.addEventListener("dblclick", function(event){
      event.preventDefault();
    }, { passive:false });

    document.addEventListener("touchend", function(event){
      const now = Date.now();
      if(now - lastTouchEnd <= 350){
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive:false });

    updateDisplay();
  </script>
</body>
</html>
