<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>テプラ3桁リーダー試作</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: sans-serif;
    text-align: center;
  }

  h1 {
    font-size: 20px;
    margin: 12px 0 8px;
  }

  .wrap {
    position: relative;
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
  }

  video {
    width: 100%;
    height: auto;
    display: block;
    background: #000;
    border-radius: 12px;
  }

  .guide {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 74%;
    height: 18%;
    transform: translate(-50%, -50%);
    border: 3px solid #00e5ff;
    border-radius: 12px;
    box-sizing: border-box;
    pointer-events: none;
    box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.25);
  }

  .guide::before,
  .guide::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: rgba(0, 229, 255, 0.75);
  }

  .guide::before { left: 33.333%; }
  .guide::after  { left: 66.666%; }

  .panel {
    max-width: 520px;
    margin: 10px auto 20px;
    padding: 0 12px;
    box-sizing: border-box;
    text-align: left;
  }

  .box {
    background: #1e1e1e;
    border-radius: 12px;
    padding: 12px;
    margin-top: 10px;
  }

  .big {
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 8px;
    text-align: center;
    margin-top: 8px;
  }

  .status {
    font-size: 13px;
    color: #bbb;
    margin-top: 8px;
    text-align: center;
  }

  .row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  button {
    font-size: 16px;
    border-radius: 10px;
    border: none;
    padding: 12px;
    box-sizing: border-box;
    background: #00bcd4;
    color: white;
    font-weight: bold;
    flex: 1;
    min-width: 120px;
  }

  #debugCanvas {
    margin-top: 10px;
    width: 100%;
    background: #222;
    border-radius: 12px;
  }

  .logArea {
    max-height: 240px;
    overflow-y: auto;
    background: #0f0f0f;
    border-radius: 12px;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .small {
    font-size: 13px;
    color: #bbb;
    line-height: 1.5;
  }

  .ok { color: #7CFC00; }
  .warn { color: #ffd166; }
  .err { color: #ff6b6b; }
</style>
</head>
<body>
  <h1>テプラ3桁リーダー試作</h1>

  <div class="wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="guide"></div>
  </div>

  <div class="panel">
    <div class="box">
      <div>現在の結果</div>
      <div id="result" class="big">---</div>
      <div id="status" class="status warn">待機中</div>
    </div>

    <div class="row">
      <button id="startBtn">カメラ開始</button>
      <button id="clearBtn">ログ消去</button>
    </div>

    <canvas id="debugCanvas" width="360" height="120"></canvas>

    <div class="box">
      <div>ログ</div>
      <div id="logArea" class="logArea"></div>
    </div>

    <div class="small" style="margin-top:10px;">
      使い方：中央の枠に3桁のテプラ数字を合わせてください。<br>
      黒文字・太字前提です。背景は青/黄色を想定しています。<br>
      認識が安定したらログに追加されます。
    </div>
  </div>

<script>
(() => {
  const video = document.getElementById('video');
  const startBtn = document.getElementById('startBtn');
  const clearBtn = document.getElementById('clearBtn');
  const resultEl = document.getElementById('result');
  const statusEl = document.getElementById('status');
  const debugCanvas = document.getElementById('debugCanvas');
  const logArea = document.getElementById('logArea');

  const dctx = debugCanvas.getContext('2d', { willReadFrequently: true });
  const workCanvas = document.createElement('canvas');
  const wctx = workCanvas.getContext('2d', { willReadFrequently: true });

  let stream = null;
  let timer = null;

  let lastCandidate = '';
  let sameCount = 0;
  let lastLogged = '';
  let lockedUntil = 0;

  const PROCESS_INTERVAL = 70;
  const REQUIRED_CONSENSUS = 2;
  const LOCK_MS = 700;

  const TEMPLATE_W = 28;
  const TEMPLATE_H = 48;

  const templates = [];

  function setStatus(text, cls = 'warn') {
    statusEl.textContent = text;
    statusEl.className = `status ${cls}`;
  }

  function addLog(text) {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');
    const ms = String(now.getMilliseconds()).padStart(3, '0');

    logArea.textContent += `[${hh}:${mm}:${ss}.${ms}] ${text}\n`;
    logArea.scrollTop = logArea.scrollHeight;
  }

  function clearLog() {
    logArea.textContent = '';
  }

  function makeTemplates() {
    const tmpCanvas = document.createElement('canvas');
    const tctx = tmpCanvas.getContext('2d', { willReadFrequently: true });

    tmpCanvas.width = TEMPLATE_W;
    tmpCanvas.height = TEMPLATE_H;

    templates.length = 0;

    for (let n = 0; n <= 9; n++) {
      tctx.clearRect(0, 0, TEMPLATE_W, TEMPLATE_H);
      tctx.fillStyle = '#ffffff';
      tctx.fillRect(0, 0, TEMPLATE_W, TEMPLATE_H);

      tctx.fillStyle = '#000000';
      tctx.textAlign = 'center';
      tctx.textBaseline = 'middle';
      tctx.font = 'bold 42px Arial, Helvetica, sans-serif';
      tctx.fillText(String(n), TEMPLATE_W / 2, TEMPLATE_H / 2 + 1);

      const img = tctx.getImageData(0, 0, TEMPLATE_W, TEMPLATE_H);
      const bin = rgbaToBinaryByBlackExtraction(img.data, TEMPLATE_W, TEMPLATE_H);
      templates.push(bin);
    }
  }

  function rgbaToBinaryByBlackExtraction(data, w, h) {
    const out = new Uint8Array(w * h);

    for (let i = 0, p = 0; i < data.length; i += 4, p++) {
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      const brightness = (r + g + b) / 3;
      const maxv = Math.max(r, g, b);
      const minv = Math.min(r, g, b);
      const saturation = maxv - minv;

      // 黒文字抽出寄り
      const isBlack =
        brightness < 95 ||
        (brightness < 120 && saturation < 70);

      out[p] = isBlack ? 1 : 0;
    }

    return out;
  }

  function cropBounds(bin, w, h) {
    let minX = w, minY = h, maxX = -1, maxY = -1;

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        if (bin[y * w + x]) {
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }

    if (maxX < minX || maxY < minY) return null;
    return { minX, minY, maxX, maxY };
  }

  function resizeBinary(srcBin, srcW, srcH, dstW, dstH) {
    const dst = new Uint8Array(dstW * dstH);
    for (let y = 0; y < dstH; y++) {
      const sy = Math.min(srcH - 1, Math.floor(y * srcH / dstH));
      for (let x = 0; x < dstW; x++) {
        const sx = Math.min(srcW - 1, Math.floor(x * srcW / dstW));
        dst[y * dstW + x] = srcBin[sy * srcW + sx];
      }
    }
    return dst;
  }

  function scoreDigit(bin) {
    let bestDigit = -1;
    let bestScore = -1;

    for (let d = 0; d <= 9; d++) {
      const tmpl = templates[d];
      let same = 0;
      for (let i = 0; i < tmpl.length; i++) {
        if (tmpl[i] === bin[i]) same++;
      }
      if (same > bestScore) {
        bestScore = same;
        bestDigit = d;
      }
    }

    return {
      digit: bestDigit,
      score: bestScore / templates[0].length
    };
  }

  function drawBinaryToCanvas(bin, w, h, dx, dy, dw, dh) {
    const temp = document.createElement('canvas');
    temp.width = w;
    temp.height = h;
    const tctx = temp.getContext('2d');

    const img = tctx.createImageData(w, h);
    for (let i = 0; i < bin.length; i++) {
      const v = bin[i] ? 0 : 255;
      const p = i * 4;
      img.data[p] = v;
      img.data[p + 1] = v;
      img.data[p + 2] = v;
      img.data[p + 3] = 255;
    }
    tctx.putImageData(img, 0, 0);
    dctx.drawImage(temp, dx, dy, dw, dh);
  }

  function processFrame() {
    if (!video.videoWidth || !video.videoHeight) return;
    if (Date.now() < lockedUntil) return;

    const vw = video.videoWidth;
    const vh = video.videoHeight;

    // 画面中央ガイド相当
    const rx = 0.13;
    const ry = 0.41;
    const rw = 0.74;
    const rh = 0.18;

    const sx = Math.floor(vw * rx);
    const sy = Math.floor(vh * ry);
    const sw = Math.floor(vw * rw);
    const sh = Math.floor(vh * rh);

    workCanvas.width = sw;
    workCanvas.height = sh;
    wctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

    const img = wctx.getImageData(0, 0, sw, sh);
    const bin = rgbaToBinaryByBlackExtraction(img.data, sw, sh);

    dctx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
    drawBinaryToCanvas(bin, sw, sh, 0, 0, debugCanvas.width, debugCanvas.height);

    const digits = [];
    let totalConfidence = 0;

    for (let i = 0; i < 3; i++) {
      const x0 = Math.floor(sw * i / 3);
      const x1 = Math.floor(sw * (i + 1) / 3);
      const cw = x1 - x0;
      const ch = sh;

      const part = new Uint8Array(cw * ch);

      for (let y = 0; y < ch; y++) {
        for (let x = 0; x < cw; x++) {
          part[y * cw + x] = bin[y * sw + (x0 + x)];
        }
      }

      const bounds = cropBounds(part, cw, ch);
      if (!bounds) {
        resultEl.textContent = '---';
        setStatus('数字が見つかりません', 'err');
        sameCount = 0;
        lastCandidate = '';
        return;
      }

      const pad = 2;
      const bx0 = Math.max(0, bounds.minX - pad);
      const by0 = Math.max(0, bounds.minY - pad);
      const bx1 = Math.min(cw - 1, bounds.maxX + pad);
      const by1 = Math.min(ch - 1, bounds.maxY + pad);

      const bw = bx1 - bx0 + 1;
      const bh = by1 - by0 + 1;

      const cropped = new Uint8Array(bw * bh);
      for (let y = 0; y < bh; y++) {
        for (let x = 0; x < bw; x++) {
          cropped[y * bw + x] = part[(by0 + y) * cw + (bx0 + x)];
        }
      }

      const norm = resizeBinary(cropped, bw, bh, TEMPLATE_W, TEMPLATE_H);
      const scored = scoreDigit(norm);

      digits.push(scored.digit);
      totalConfidence += scored.score;
    }

    const text = digits.join('');
    const avgConfidence = totalConfidence / 3;

    resultEl.textContent = text;

    if (avgConfidence < 0.70) {
      setStatus(`候補: ${text} / 信頼度低め ${avgConfidence.toFixed(2)}`, 'warn');
      sameCount = 0;
      lastCandidate = '';
      return;
    }

    if (text === lastCandidate) {
      sameCount++;
    } else {
      lastCandidate = text;
      sameCount = 1;
    }

    if (sameCount >= REQUIRED_CONSENSUS) {
      setStatus(`確定: ${text} / 信頼度 ${avgConfidence.toFixed(2)}`, 'ok');

      if (lastLogged !== text) {
        addLog(`認識: ${text}  信頼度=${avgConfidence.toFixed(2)}`);
        lastLogged = text;
      }

      lockedUntil = Date.now() + LOCK_MS;
    } else {
      setStatus(`確認中: ${text} / 信頼度 ${avgConfidence.toFixed(2)}`, 'warn');
    }
  }

  async function startCamera() {
    try {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
      }

      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      if (timer) clearInterval(timer);
      timer = setInterval(processFrame, PROCESS_INTERVAL);

      setStatus('カメラ開始', 'ok');
      addLog('カメラ開始');
    } catch (e) {
      console.error(e);
      setStatus('カメラ起動失敗。Bluefy/HTTPS/権限を確認してください', 'err');
      addLog('カメラ起動失敗');
    }
  }

  startBtn.addEventListener('click', startCamera);
  clearBtn.addEventListener('click', clearLog);

  makeTemplates();
})();
</script>
</body>
</html>
