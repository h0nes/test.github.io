<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>XIAO BLE Keypad</title>
  <style>
    :root{
      --bg:#0b0f16;
      --panel:#141b27;
      --panel2:#1b2332;
      --key:#2a3445;
      --key2:#445268;
      --text:#ffffff;
      --sub:#b8c2d0;
      --blue:#56a8ff;
      --red:#ff6677;
      --green:#49e09b;
      --border:#334157;
      --shadow:0 10px 28px rgba(0,0,0,.35);
      --radius:18px;
      --gap:12px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    body{
      padding:14px;
    }

    .app{
      max-width:560px;
      margin:0 auto;
    }

    .card{
      background:var(--panel);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:14px;
    }

    .title{
      font-size:clamp(22px, 5vw, 34px);
      font-weight:800;
      margin-bottom:12px;
      letter-spacing:.02em;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:10px;
      align-items:center;
    }

    .status{
      min-height:44px;
      background:var(--panel2);
      border-radius:14px;
      border:1px solid rgba(255,255,255,.04);
      color:var(--sub);
      display:flex;
      align-items:center;
      padding:0 14px;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
      font-size:15px;
    }

    .mini-btn{
      height:44px;
      min-width:86px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-size:18px;
      font-weight:800;
      padding:0 16px;
      box-shadow:var(--shadow);
    }

    .connect{ background:var(--blue); }
    .disconnect{ background:var(--red); }

    .display-wrap{
      margin-top:12px;
    }

    .display-label{
      color:var(--sub);
      font-size:14px;
      margin-bottom:8px;
    }

    .display{
      min-height:72px;
      border-radius:16px;
      border:2px solid var(--border);
      background:#050912;
      padding:14px 16px;
      font-size:42px;
      font-weight:800;
      letter-spacing:.03em;
      overflow-wrap:anywhere;
      display:flex;
      align-items:center;
    }

    .pad-title{
      font-size:18px;
      font-weight:800;
      margin-bottom:12px;
    }

    .pad-grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:var(--gap);
    }

    .key{
      border:none;
      border-radius:18px;
      min-height:84px;
      background:var(--key);
      color:#fff;
      font-size:28px;
      font-weight:800;
      box-shadow:var(--shadow);
    }

    .key:active,
    .mini-btn:active{
      transform:scale(0.98);
    }

    .fn{
      background:#566781;
      font-size:20px;
    }

    .macro{
      background:#5d6f89;
      font-size:24px;
    }

    .enter{
      background:var(--green);
      color:#072317;
      font-size:22px;
    }

    .zero{
      grid-column:2 / span 2;
    }

    @media (max-width:430px){
      body{
        padding:10px;
      }

      .card{
        padding:12px;
        margin-bottom:12px;
      }

      .topbar{
        grid-template-columns:1fr auto auto;
        gap:8px;
      }

      .status{
        min-height:40px;
        font-size:13px;
        padding:0 10px;
      }

      .mini-btn{
        height:40px;
        min-width:72px;
        font-size:16px;
        padding:0 12px;
      }

      .display{
        min-height:64px;
        font-size:36px;
      }

      .pad-grid{
        gap:10px;
      }

      .key{
        min-height:74px;
        font-size:24px;
        border-radius:16px;
      }

      .fn{
        font-size:18px;
      }

      .macro{
        font-size:22px;
      }

      .enter{
        font-size:20px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="title">XIAO BLE テンキー + マクロパッド</div>

      <div class="topbar">
        <div id="status" class="status">未接続</div>
        <button class="mini-btn connect" onclick="connectBLE()">接続</button>
        <button class="mini-btn disconnect" onclick="disconnectBLE()">切断</button>
      </div>

      <div class="display-wrap">
        <div class="display-label">入力中</div>
        <div id="display" class="display"></div>
      </div>
    </div>

    <div class="card">
      <div class="pad-title">テンキー</div>

      <div class="pad-grid">
        <button class="key" onclick="appendInput('7')">7</button>
        <button class="key" onclick="appendInput('8')">8</button>
        <button class="key" onclick="appendInput('9')">9</button>
        <button class="key macro" onclick="sendMacro('MACRO_A')">A</button>

        <button class="key" onclick="appendInput('4')">4</button>
        <button class="key" onclick="appendInput('5')">5</button>
        <button class="key" onclick="appendInput('6')">6</button>
        <button class="key macro" onclick="sendMacro('MACRO_B')">B</button>

        <button class="key" onclick="appendInput('1')">1</button>
        <button class="key" onclick="appendInput('2')">2</button>
        <button class="key" onclick="appendInput('3')">3</button>
        <button class="key macro" onclick="sendMacro('MACRO_C')">C</button>

        <button class="key fn" onclick="backspaceInput()">BS</button>
        <button class="key zero" onclick="appendInput('0')">0</button>
        <button class="key enter" onclick="sendCurrentInput()">Ent</button>
      </div>
    </div>
  </div>

  <script>
    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const RX_UUID      = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

    let device = null;
    let server = null;
    let service = null;
    let rxChar = null;
    let inputBuffer = "";

    const statusEl = document.getElementById("status");
    const displayEl = document.getElementById("display");

    function setStatus(text){
      statusEl.textContent = text;
      console.log(text);
    }

    function updateDisplay(){
      displayEl.textContent = inputBuffer;
    }

    function appendInput(char){
      inputBuffer += char;
      updateDisplay();
    }

    function backspaceInput(){
      inputBuffer = inputBuffer.slice(0, -1);
      updateDisplay();
    }

    function clearInput(){
      inputBuffer = "";
      updateDisplay();
    }

    async function connectBLE(){
      try{
        setStatus("BLEデバイスを検索中...");

        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }]
        });

        setStatus("接続中: " + (device.name || "名称不明"));

        device.addEventListener("gattserverdisconnected", onDisconnected);

        server = await device.gatt.connect();
        service = await server.getPrimaryService(SERVICE_UUID);
        rxChar = await service.getCharacteristic(RX_UUID);

        setStatus("接続完了: " + (device.name || "名称不明"));
      }catch(e){
        setStatus("接続失敗: " + (e && (e.message || e.name)) || String(e));
      }
    }

    function onDisconnected(){
      setStatus("切断されました");
      server = null;
      service = null;
      rxChar = null;
    }

    async function disconnectBLE(){
      try{
        if(device && device.gatt && device.gatt.connected){
          device.gatt.disconnect();
        }
        device = null;
        server = null;
        service = null;
        rxChar = null;
        setStatus("手動で切断しました");
      }catch(e){
        setStatus("切断失敗: " + ((e && (e.message || e.name)) || String(e)));
      }
    }

    async function sendText(text){
      if(!rxChar){
        setStatus("未接続のため送信できません");
        return false;
      }

      try{
        const data = new TextEncoder().encode(text);
        await rxChar.writeValue(data);
        setStatus("送信: " + text.replace(/\n/g, "\\n"));
        return true;
      }catch(e){
        setStatus("送信失敗: " + ((e && (e.message || e.name)) || String(e)));
        return false;
      }
    }

    async function sendCurrentInput(){
      if(inputBuffer.length === 0){
        setStatus("入力が空です");
        return;
      }

      const ok = await sendText("NUM:" + inputBuffer + "\n");
      if(ok){
        clearInput();
      }
    }

    async function sendMacro(name){
      await sendText(name + "\n");
    }

    updateDisplay();
  </script>
</body>
</html>
